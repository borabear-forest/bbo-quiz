<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MMPI-2 퀴즈">
<title>MMPI-2 핵심 암기 퀴즈</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#ffffff;--bg2:#f5f4f0;--bg3:#eceae4;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#999;
  --border:#e0ddd6;--border2:#c8c5bc;
  --correct-bg:#e6f7ef;--correct-border:#1a9e6f;--correct-text:#0a5c40;
  --wrong-bg:#fdf0eb;--wrong-border:#d45a28;--wrong-text:#7a2e10;
  --info-bg:#e8f0fb;--info-text:#1a4a9e;
  --accent:#1a1a1a;
  --radius:10px;--radius-lg:14px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text:#f2f2f7;--text2:#aeaeb2;--text3:#6e6e73;
    --border:#3a3a3c;--border2:#545458;
    --correct-bg:#0a2e1f;--correct-border:#1a9e6f;--correct-text:#4fd4a0;
    --wrong-bg:#2e150a;--wrong-border:#d45a28;--wrong-text:#f0a070;
    --info-bg:#0a1e3a;--info-text:#60a0f0;
    --accent:#f2f2f7;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;}
.app{max-width:680px;margin:0 auto;padding:0 0 80px;}

/* Header */
.header{background:var(--bg);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.app-title{font-size:17px;font-weight:600;color:var(--text);}
.stats-row{display:flex;gap:8px;}
.stat-pill{font-size:12px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);}
.stat-pill b{color:var(--text);font-weight:600;}
.prog-wrap{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease;}

/* Filters */
.filter-wrap{background:var(--bg);padding:10px 16px;border-bottom:1px solid var(--border);overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;}
.filter-wrap::-webkit-scrollbar{display:none;}
.filter-btn{display:inline-block;font-size:13px;padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;margin-right:6px;white-space:nowrap;transition:all .15s;}
.filter-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);}

/* Cards */
.card-list{padding:12px 12px 0;}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:10px;transition:border-color .2s;}
.card.answered-correct{border-color:var(--correct-border);background:var(--correct-bg);}
.card.answered-wrong{border-color:var(--wrong-border);background:var(--wrong-bg);}
.card-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.tag-cat{background:var(--info-bg);color:var(--info-text);}
.tag-type{background:var(--bg2);color:var(--text3);border:1px solid var(--border);}
.qnum{font-size:11px;color:var(--text3);margin-left:auto;}

.question{font-size:15px;line-height:1.75;color:var(--text);margin-bottom:12px;}
.blank-marker{display:inline-block;border-bottom:2px solid var(--accent);min-width:70px;text-align:center;padding:0 4px;color:var(--text3);}
.blank-filled-ok{border-bottom:2px solid var(--correct-border);color:var(--correct-text);background:rgba(26,158,111,0.12);border-radius:3px;padding:0 4px;}
.blank-filled-ng{border-bottom:2px solid var(--wrong-border);color:var(--wrong-text);background:rgba(212,90,40,0.12);border-radius:3px;padding:0 4px;}

/* Inputs */
.input-area{display:flex;flex-direction:column;gap:8px;}
.inp-row{display:flex;gap:8px;align-items:center;}
.inp-label{font-size:12px;color:var(--text3);min-width:40px;}
.q-input{flex:1;font-size:15px;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;-webkit-appearance:none;}
.q-input:focus{border-color:var(--accent);}
.q-input.inp-ok{border-color:var(--correct-border);background:var(--correct-bg);}
.q-input.inp-ng{border-color:var(--wrong-border);background:var(--wrong-bg);}
.check-btn{width:100%;padding:10px;font-size:14px;font-weight:600;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg2);color:var(--text);cursor:pointer;margin-top:2px;}
.check-btn:active{opacity:.7;}

/* Choices */
.choices{display:flex;flex-direction:column;gap:7px;}
.choice-btn{padding:11px 14px;font-size:14px;text-align:left;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;line-height:1.5;transition:all .15s;}
.choice-btn:active{opacity:.7;}
.choice-btn.selected-ok{background:var(--correct-bg);border-color:var(--correct-border);color:var(--correct-text);font-weight:600;}
.choice-btn.selected-ng{background:var(--wrong-bg);border-color:var(--wrong-border);color:var(--wrong-text);}
.choice-btn.reveal{background:var(--correct-bg);border-color:var(--correct-border);color:var(--correct-text);font-weight:600;}
.choice-btn:disabled{cursor:default;}

/* Feedback */
.feedback{display:none;margin-top:10px;padding:10px 12px;border-radius:var(--radius);font-size:13px;line-height:1.65;}
.feedback.ok{background:var(--correct-bg);color:var(--correct-text);border:1px solid var(--correct-border);}
.feedback.ng{background:var(--wrong-bg);color:var(--wrong-text);border:1px solid var(--wrong-border);}
.ans-badge{display:inline-block;font-weight:700;padding:1px 6px;background:rgba(26,158,111,0.18);border-radius:3px;}
.hint-text{margin-top:4px;font-size:12px;opacity:.8;}

/* Bottom bar */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;z-index:100;}
.bottom-bar button{flex:1;padding:10px;font-size:13px;font-weight:600;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg2);color:var(--text);cursor:pointer;}
.bottom-bar button:active{opacity:.7;}
.btn-reset{color:var(--wrong-text) !important;border-color:var(--wrong-border) !important;}

/* Empty */
.empty-msg{padding:40px 16px;text-align:center;color:var(--text3);font-size:14px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="app-title">MMPI-2 핵심 암기 퀴즈</div>
      <div class="stats-row">
        <div class="stat-pill">✓ <b id="sc">0</b></div>
        <div class="stat-pill">✗ <b id="wc">0</b></div>
        <div class="stat-pill">남 <b id="rc">0</b></div>
      </div>
    </div>
    <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>
  </div>
  <div class="filter-wrap" id="filters"></div>
  <div class="card-list" id="list"></div>
</div>
<div class="bottom-bar">
  <button onclick="scrollToFirst()">⬆ 첫 문제</button>
  <button onclick="scrollToNext()">→ 다음 미답</button>
  <button class="btn-reset" onclick="confirmReset()">↺ 초기화</button>
</div>

let state = {};
let activeFilter = '전체';
const cats = ['전체',...new Set(QS.map(q=>q.cat))];

function initState(){
  state = {};
  QS.forEach(q=>{state[q.id]={answered:false,correct:null};});
}

function updateStats(){
  const all = QS.filter(q=>activeFilter==='전체'||q.cat===activeFilter);
  const done = all.filter(q=>state[q.id].answered);
  const correct = done.filter(q=>state[q.id].correct).length;
  const wrong = done.filter(q=>!state[q.id].correct).length;
  document.getElementById('sc').textContent=correct;
  document.getElementById('wc').textContent=wrong;
  document.getElementById('rc').textContent=all.length-done.length;
  document.getElementById('prog').style.width=all.length?(Math.round(done.length/all.length*100)+'%'):'0%';
}

function buildFilters(){
  const el=document.getElementById('filters');
  el.innerHTML=cats.map(c=>`<button class="filter-btn ${c===activeFilter?'active':''}" onclick="setFilter('${c}')">${c}${c==='전체'?` (${QS.length})`:`(${QS.filter(q=>q.cat===c).length})`}</button>`).join('');
}

function setFilter(cat){
  activeFilter=cat;
  buildFilters();
  renderAll();
  updateStats();
}

function normalizeAns(s){
  return s.toLowerCase().replace(/[\s\(\)\[\]·,、。]/g,'');
}

function checkBlank(id){
  const q=QS.find(q=>q.id===id);
  const vals=q.blanks.map((_,i)=>{
    const el=document.getElementById(`inp-${id}-${i}`);
    return el?el.value.trim():'';
  });
  const correct=q.blanks.every((ans,i)=>{
    const v=normalizeAns(vals[i]);
    const a=normalizeAns(ans);
    return v===a||a.includes(v)||v.includes(a);
  });
  state[id]={answered:true,correct};
  q.blanks.forEach((_,i)=>{
    const el=document.getElementById(`inp-${id}-${i}`);
    if(el){el.classList.add(correct?'inp-ok':'inp-ng');el.disabled=true;}
  });
  showFeedback(id,correct,q.hint,q.blanks);
  document.getElementById(`check-${id}`).style.display='none';
  document.getElementById(`card-${id}`).className=`card ${correct?'answered-correct':'answered-wrong'}`;
  updateStats();
}

function checkChoice(id,choice){
  const q=QS.find(q=>q.id===id);
  const correct=choice===q.ans;
  state[id]={answered:true,correct};
  document.querySelectorAll(`.ch-${id}`).forEach(btn=>{
    btn.disabled=true;
    if(btn.dataset.val===q.ans)btn.classList.add('reveal');
    if(btn.dataset.val===choice&&!correct)btn.classList.add('selected-ng');
    if(btn.dataset.val===choice&&correct)btn.classList.add('selected-ok');
  });
  showFeedback(id,correct,q.hint,[q.ans]);
  document.getElementById(`card-${id}`).className=`card ${correct?'answered-correct':'answered-wrong'}`;
  updateStats();
}

function showFeedback(id,correct,hint,answers){
  const fb=document.getElementById(`fb-${id}`);
  if(!fb)return;
  const ansHtml=answers.map(a=>`<span class="ans-badge">${a}</span>`).join(', ');
  fb.className=`feedback ${correct?'ok':'ng'}`;
  fb.innerHTML=correct
    ?`✓ 정답!${hint?`<div class="hint-text">${hint}</div>`:''}`
    :`✗ 정답: ${ansHtml}${hint?`<div class="hint-text">${hint}</div>`:''}`;
  fb.style.display='block';
}

function renderCard(q){
  const s=state[q.id];
  const answered=s.answered;
  const cardCls=answered?(s.correct?'card answered-correct':'card answered-wrong'):'card';

  let qHtml=q.q;
  let inputHtml='';

  if(q.type==='빈칸'){
    let idx=0;
    qHtml=q.q.replace(/<b>\[ \]<\/b>/g,()=>{
      const marker=`<span class="blank-marker">  </span>`;
      idx++;
      return marker;
    });
    if(!answered){
      inputHtml=`<div class="input-area">
        ${q.blanks.map((_,i)=>`<div class="inp-row">
          ${q.blanks.length>1?`<span class="inp-label">빈칸${i+1}</span>`:''}
          <input class="q-input" id="inp-${q.id}-${i}" placeholder="${i+1}번 빈칸 입력" autocomplete="off" onkeydown="if(event.key==='Enter'){if(${i}===${q.blanks.length-1})checkBlank(${q.id});else{const nx=document.getElementById('inp-${q.id}-${i+1}');if(nx)nx.focus();}}" />
        </div>`).join('')}
        <button class="check-btn" id="check-${q.id}" onclick="checkBlank(${q.id})">정답 확인</button>
      </div>`;
    }
  } else {
    const shuffled=[...q.choices].sort(()=>Math.random()-.5);
    if(!answered){
      inputHtml=`<div class="choices">${shuffled.map(c=>`<button class="choice-btn ch-${q.id}" data-val="${c}" onclick="checkChoice(${q.id},'${c.replace(/'/g,"\\'")}')">
        ${c}
      </button>`).join('')}</div>`;
    }
  }

  return `<div class="${cardCls}" id="card-${q.id}">
    <div class="card-meta">
      <span class="tag tag-cat">${q.cat}</span>
      <span class="tag tag-type">${q.type}</span>
      <span class="qnum">Q${q.id}</span>
    </div>
    <div class="question">${qHtml}</div>
    ${inputHtml}
    <div class="feedback" id="fb-${q.id}" style="display:none"></div>
  </div>`;
}

function renderAll(){
  const filtered=QS.filter(q=>activeFilter==='전체'||q.cat===activeFilter);
  const list=document.getElementById('list');
  if(!filtered.length){list.innerHTML='<div class="empty-msg">해당 카테고리의 문제가 없습니다.</div>';return;}
  list.innerHTML=filtered.map(renderCard).join('');
}

function scrollToFirst(){
  document.getElementById(`card-${(QS.filter(q=>activeFilter==='전체'||q.cat===activeFilter)[0]||QS[0]).id}`)?.scrollIntoView({behavior:'smooth',block:'start'});
}

function scrollToNext(){
  const filtered=QS.filter(q=>activeFilter==='전체'||q.cat===activeFilter);
  const next=filtered.find(q=>!state[q.id].answered);
  if(next){
    document.getElementById(`card-${next.id}`)?.scrollIntoView({behavior:'smooth',block:'start'});
  } else {
    alert('🎉 모든 문제를 풀었어요!');
  }
}

function confirmReset(){
  if(confirm('모든 답을 초기화할까요?')){
    initState();
    renderAll();
    updateStats();
    window.scrollTo({top:0,behavior:'smooth'});
  }
}

initState();
buildFilters();
renderAll();
updateStats();
</script>
