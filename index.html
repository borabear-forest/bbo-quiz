<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MMPI-2 퀴즈">
<title>MMPI-2 완전 정복 퀴즈</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#ffffff;--bg2:#f5f4f0;--bg3:#eceae4;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#999;
  --border:#e0ddd6;--border2:#c8c5bc;
  --correct-bg:#e6f7ef;--correct-border:#1a9e6f;--correct-text:#0a5c40;
  --wrong-bg:#fdf0eb;--wrong-border:#d45a28;--wrong-text:#7a2e10;
  --info-bg:#e8f0fb;--info-text:#1a4a9e;
  --accent:#2c3e50;
  --accent2:#3498db;
  --radius:10px;--radius-lg:14px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text:#f2f2f7;--text2:#aeaeb2;--text3:#6e6e73;
    --border:#3a3a3c;--border2:#545458;
    --correct-bg:#0a2e1f;--correct-border:#1a9e6f;--correct-text:#4fd4a0;
    --wrong-bg:#2e150a;--wrong-border:#d45a28;--wrong-text:#f0a070;
    --info-bg:#0a1e3a;--info-text:#60a0f0;
    --accent:#4a90d9;
    --accent2:#3498db;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;}

/* ── 탭 헤더 ── */
.tab-header{background:var(--accent);position:sticky;top:0;z-index:200;}
.tab-title{color:#fff;font-size:15px;font-weight:700;padding:14px 16px 0;letter-spacing:-.3px;}
.tab-row{display:flex;padding:10px 16px 0;}
.tab-btn{flex:1;padding:9px 0;font-size:13px;font-weight:600;border:none;background:rgba(255,255,255,.15);color:rgba(255,255,255,.75);cursor:pointer;border-radius:8px 8px 0 0;transition:all .2s;}
.tab-btn+.tab-btn{margin-left:6px;}
.tab-btn.active{background:#fff;color:var(--accent);}

/* ── 공통 헤더(진도바) ── */
.sub-header{background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px;}
.stats-row{display:flex;gap:8px;margin-bottom:8px;}
.stat-pill{font-size:12px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);}
.stat-pill b{color:var(--text);font-weight:700;}
.prog-wrap{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent2);border-radius:2px;transition:width .4s ease;}
.prog-text{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:4px;}

/* ── 패널 ── */
.panel{display:none;}
.panel.active{display:block;}

/* ─── 30문제 패널 스타일 ─── */
.p30-wrap{max-width:720px;margin:0 auto;padding:14px 12px 90px;}
.done-banner{display:none;background:var(--bg);border-radius:14px;padding:30px 20px;text-align:center;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.done-emoji{font-size:48px;margin-bottom:12px;}
.done-title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:8px;}
.done-sub{font-size:14px;color:var(--text2);}

.q-card{background:var(--bg);border-radius:14px;padding:20px 16px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.06);border-left:4px solid var(--border);}
.q-card.c-correct{border-left-color:var(--correct-border);}
.q-card.c-wrong{border-left-color:var(--wrong-border);}
.q-num{display:inline-block;background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:10px;}
.q-text{font-size:15px;font-weight:600;line-height:1.8;color:var(--text);white-space:pre-line;margin-bottom:14px;}

.options{display:flex;flex-direction:column;gap:8px;}
.opt-btn{background:var(--bg2);border:1.5px solid var(--border);padding:12px 14px;border-radius:10px;text-align:left;font-size:14px;line-height:1.5;cursor:pointer;transition:all .18s;color:var(--text);width:100%;}
.opt-btn:hover:not(:disabled){background:var(--info-bg);border-color:var(--accent2);}
.opt-btn.correct{background:var(--correct-bg);border-color:var(--correct-border);color:var(--correct-text);font-weight:700;}
.opt-btn.wrong{background:var(--wrong-bg);border-color:var(--wrong-border);color:var(--wrong-text);}
.opt-btn.reveal{background:var(--correct-bg);border-color:var(--correct-border);color:var(--correct-text);font-weight:700;}
.opt-btn:disabled{cursor:default;}

.hint-toggle{margin-top:10px;background:none;border:none;color:#e67e22;font-size:13px;font-weight:700;cursor:pointer;padding:0;display:flex;align-items:center;gap:4px;}
.hint-box{margin-top:8px;background:#fef9e7;border-left:4px solid #f39c12;padding:10px 12px;border-radius:6px;font-size:13px;line-height:1.65;display:none;color:#7d4e00;}
.result-box{margin-top:12px;padding:12px 14px;border-radius:10px;font-size:13px;line-height:1.7;display:none;white-space:pre-line;}
.result-box.correct{background:var(--correct-bg);color:var(--correct-text);border:1px solid var(--correct-border);}
.result-box.wrong{background:var(--wrong-bg);color:var(--wrong-text);border:1px solid var(--wrong-border);}
.result-label{font-weight:800;font-size:14px;margin-bottom:6px;}

/* ─── 120문제 패널 스타일 ─── */
.filter-wrap{background:var(--bg);padding:10px 16px;border-bottom:1px solid var(--border);overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;}
.filter-wrap::-webkit-scrollbar{display:none;}
.filter-btn{display:inline-block;font-size:13px;padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;margin-right:6px;white-space:nowrap;transition:all .15s;}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}

.card-list{padding:12px 12px 0;max-width:720px;margin:0 auto;}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:10px;transition:border-color .2s;}
.card.answered-correct{border-color:var(--correct-border);background:var(--correct-bg);}
.card.answered-wrong{border-color:var(--wrong-border);background:var(--wrong-bg);}
.card-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.tag-cat{background:var(--info-bg);color:var(--info-text);}
.tag-type{background:var(--bg2);color:var(--text3);border:1px solid var(--border);}
.qnum{font-size:11px;color:var(--text3);margin-left:auto;}

.question{font-size:15px;line-height:1.75;color:var(--text);margin-bottom:12px;}
.blank-marker{display:inline-block;border-bottom:2px solid var(--accent);min-width:70px;text-align:center;padding:0 4px;color:var(--text3);}

.input-area{display:flex;flex-direction:column;gap:8px;}
.inp-row{display:flex;gap:8px;align-items:center;}
.inp-label{font-size:12px;color:var(--text3);min-width:40px;}
.q-input{flex:1;font-size:15px;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;-webkit-appearance:none;}
.q-input:focus{border-color:var(--accent);}
.q-input.inp-ok{border-color:var(--correct-border);background:var(--correct-bg);}
.q-input.inp-ng{border-color:var(--wrong-border);background:var(--wrong-bg);}
.check-btn{width:100%;padding:10px;font-size:14px;font-weight:600;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg2);color:var(--text);cursor:pointer;margin-top:2px;}
.check-btn:active{opacity:.7;}

.choices{display:flex;flex-direction:column;gap:7px;}
.choice-btn{padding:11px 14px;font-size:14px;text-align:left;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;line-height:1.5;transition:all .15s;}
.choice-btn:active{opacity:.7;}
.choice-btn.selected-ok{background:var(--correct-bg);border-color:var(--correct-border);color:var(--correct-text);font-weight:600;}
.choice-btn.selected-ng{background:var(--wrong-bg);border-color:var(--wrong-border);color:var(--wrong-text);}
.choice-btn.reveal{background:var(--correct-bg);border-color:var(--correct-border);color:var(--correct-text);font-weight:600;}
.choice-btn:disabled{cursor:default;}

.feedback{display:none;margin-top:10px;padding:10px 12px;border-radius:var(--radius);font-size:13px;line-height:1.65;}
.feedback.ok{background:var(--correct-bg);color:var(--correct-text);border:1px solid var(--correct-border);}
.feedback.ng{background:var(--wrong-bg);color:var(--wrong-text);border:1px solid var(--wrong-border);}
.ans-badge{display:inline-block;font-weight:700;padding:1px 6px;background:rgba(26,158,111,0.18);border-radius:3px;}
.hint-text{margin-top:4px;font-size:12px;opacity:.8;}
.empty-msg{padding:40px 16px;text-align:center;color:var(--text3);font-size:14px;}

/* ── 하단 바 ── */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;z-index:100;}
.bottom-bar button{flex:1;padding:10px;font-size:13px;font-weight:600;border-radius:var(--radius);border:1px solid var(--border2);background:var(--bg2);color:var(--text);cursor:pointer;}
.bottom-bar button:active{opacity:.7;}
.btn-reset{color:var(--wrong-text) !important;border-color:var(--wrong-border) !important;}
.btn-hidden{display:none;}
</style>
</head>
<body>

<!-- 탭 헤더 -->
<div class="tab-header">
  <div class="tab-title">📝 MMPI-2 완전 정복 퀴즈</div>
  <div class="tab-row">
    <button class="tab-btn active" onclick="switchTab('t30')">심화 30문제<br><span style="font-size:11px;font-weight:400">사지선다</span></button>
    <button class="tab-btn" onclick="switchTab('t120')">핵심 120문제<br><span style="font-size:11px;font-weight:400">빈칸+선택</span></button>
  </div>
</div>

<!-- 공통 진도바 -->
<div class="sub-header">
  <div class="stats-row">
    <div class="stat-pill">✓ <b id="sc">0</b></div>
    <div class="stat-pill">✗ <b id="wc">0</b></div>
    <div class="stat-pill">남 <b id="rc">0</b></div>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>
  <div class="prog-text"><span id="prog-text">0 / 0 완료</span><span id="prog-pct">0%</span></div>
</div>

<!-- ───────────── 30문제 패널 ───────────── -->
<div class="panel active" id="panel-t30">
  <div class="p30-wrap">
    <div class="done-banner" id="done-banner">
      <div class="done-emoji">🎉</div>
      <div class="done-title">전체 완료!</div>
      <div class="done-sub" id="done-sub"></div>
    </div>
    <div id="q-list"></div>
  </div>
</div>

<!-- 120문제 패널 -->
<div class="panel" id="panel-t120">
  <div class="filter-wrap" id="filters"></div>
  <div class="card-list" id="list" style="padding-bottom:90px;"></div>
</div>

<!-- 하단 바 -->
<div class="bottom-bar" id="bottom-bar">
  <button id="btn-first" class="btn-hidden" onclick="scrollToFirst()">⬆ 첫 문제</button>
  <button id="btn-next" class="btn-hidden" onclick="scrollToNext()">→ 다음 미답</button>
  <button class="btn-reset" onclick="confirmReset()">↺ 초기화</button>
</div>

<script>
/* ================================================================
   데이터: 30문제 사지선다
================================================================ */
const QS30 = [
  {q:"MMPI-2 타당도 척도 중 전반부의 비전형적 응답 태도를 측정하는 척도는 ( ① )이고,\n281번 문항 이후 후반부의 비전형적 응답을 탐지하는 척도는 ( ② )이다.\n알맞은 척도 기호를 순서대로 고르시오.",opts:["① F, ② Fb","① Fb, ② F","① VRIN, ② TRIN","① L, ② K"],ans:0,hint:"F는 비전형(Infrequency) 전반부, b는 Back의 약자로 후반부를 뜻해.",exp:"F 척도는 검사 전반부(1~370번)의 비전형 반응을, Fb 척도는 281번 이후 후반부의 비전형 반응을 측정해. 수검자가 후반부에 피로하거나 대충 응답했는지를 탐지하는 데 특히 유용해."},
  {q:"수검자가 문항 내용을 고려하지 않고 무작위로 응답했는지를 탐지하는 [무선반응 비일관성] 척도는 ( ① )이며,\n'전부 그렇다' 혹은 '전부 아니다'처럼 고정된 방식으로 응답했는지 탐지하는 [고정반응 비일관성] 척도는 ( ② )이다.",opts:["① VRIN, ② TRIN","① TRIN, ② VRIN","① F(p), ② S","① L, ② K"],ans:0,hint:"V는 Variable(무선적), T는 True/Fixed(고정)를 연상해봐.",exp:"VRIN은 무작위 응답(Variable Response Inconsistency)을, TRIN은 고정 반응(True Response Inconsistency)을 정밀하게 탐지해. 둘 다 80T 이상이면 프로파일 해석이 불가능해."},
  {q:"MMPI-2 임상 척도 중 K 척도(교정 척도)의 점수를 더하여 보정(K-correction)하는\n5가지 임상 척도의 번호를 모두 고르시오.",opts:["1번, 4번, 7번, 8번, 9번","1번, 2번, 3번, 4번, 6번","2번, 3번, 5번, 7번, 8번","3번, 4번, 5번, 6번, 0번"],ans:0,hint:"첫 번째 구간(1번)과 중간~후반부(4·7·8·9번)에 집중되어 있어.",exp:"K 교정은 1(Hs), 4(Pd), 7(Pt), 8(Sc), 9(Ma)번 척도에만 적용돼. 방어적으로 응답한 수검자의 임상 점수를 보정하기 위해 K점수의 일정 비율을 더해. 5번과 0번은 절대 포함되지 않아."},
  {q:"자신을 실제보다 더 나쁘게 보이려고 증상을 과장하는 것을 [부정 왜곡(Fake-bad)]이라 한다.\n부정 왜곡을 탐지하는 'F 계열' 타당도 척도 3가지를 고르시오.",opts:["F, Fb, F(p)","L, K, S","VRIN, TRIN, S","RC1, RC4, RC7"],ans:0,hint:"글자 'F'가 들어가는 세 가지 핵심 타당도 척도를 떠올려봐.",exp:"F(비전형), Fb(비전형-후반부), F(p)(비전형-정신병리) 척도는 모두 증상 과장이나 Faking bad를 탐지해. 반면 L·K·S는 긍정 왜곡(Faking good) 계열이야."},
  {q:"MMPI-2 타당도 프로파일에서 L과 K 척도는 70 이상으로 높고,\nF 척도는 45 이하로 낮은 ( )자 형태를 보일 때,\n이를 '자신을 가급적 건강하고 도덕적으로 보이려는 방어적 태도(긍정 왜곡)'로 해석한다.\n빈칸에 알맞은 알파벳 모양은?",opts:["V","역V","삿갓","일직선"],ans:0,hint:"L(높음) – F(낮음) – K(높음)의 그래프 모양을 머릿속으로 연결해봐.",exp:"양쪽의 L과 K가 높고 가운데 F가 낮으므로 시각적으로 'V'자 모양을 형성해. Faking good 혹은 방어적 태도를 나타내며, 경사가 심할수록 의도적 왜곡 가능성이 높아."},
  {q:"MMPI-2 실시 시 무응답(?) 항목이 최소 몇 개 이상일 때\n프로파일 결과 해석을 하지 않거나 지양하는 것이 원칙인가?",opts:["30개","10개","20개","50개"],ans:0,hint:"앞자리가 '3'으로 시작하는 십 단위 숫자야.",exp:"무응답(?) 척도가 30개 이상이면 프로파일이 무효일 것으로 보아 해석을 지양해. 11~29개는 무효일 수 있으므로 주의해서 해석하고, 10개 이하는 유효한 것으로 본다."},
  {q:"자신을 매우 도덕적이고 적응적인 사람으로 표현하려는 '성인군자' 같은 태도를 광범위하게 측정하며,\n일명 '과장된 자기제시'라고 불리는 타당도 척도의 기호는?",opts:["S","L","K","FBS"],ans:0,hint:"Superlative(최상급의, 과장된)의 첫 글자를 따온 척도야.",exp:"S 척도(Superlative Self-Presentation)는 항공사 조종사 지원자 데이터를 기반으로 개발됐어. K와 상관이 매우 높으며, 자신을 완벽하게 도덕적이고 문제없는 사람으로 제시하려는 욕구를 광범위하게 평가해."},
  {q:"정신과 환자들도 거의 응답하지 않는 매우 특이한 응답을 찾아내어,\n실제 환자군과도 차별화되는 과장된 증상 보고나 꾀병(Fake-bad)을 정밀하게 탐지하는\n타당도 척도의 기호는?",opts:["F(p)","Fb","TRIN","S"],ans:0,hint:"F 계열 중에서도 '정신병리(Psychopathology)'를 뜻하는 소괄호 알파벳이 붙어 있어.",exp:"F(p) 척도(비전형-정신병리)는 규준집단과 외래환자 모두에서 비전형적인 반응으로 구성된 27개 문항으로 이뤄져. F 척도에 비해 정신병리에 덜 민감하므로, 진짜 정신과 환자인지 꾀병인지를 더 잘 구별해줘."},
  {q:"MMPI-2 결과 해석 순서 중 가장 먼저 수행해야 할 단계는?\n\n[ ( ① ) 척도 검토 ] → [ 임상척도 및 코드타입 해석 ] → [ 내용·보충 척도 해석 ]",opts:["① 타당도","① 재구성 임상(RC)","① 성격병리(PSY-5)","① 내용"],ans:0,hint:"검사 결과 자체가 믿을 만한지, 왜곡 여부를 먼저 체크하는 단계야.",exp:"타당도 척도를 최우선으로 검토해 프로파일의 신뢰성을 확보하는 것이 원칙이야. 타당하지 않은 프로파일을 임상 척도로 해석하면 오류가 발생해."},
  {q:"MMPI-2 임상 척도 중 3번 척도(Hy, 히스테리)가 측정하는 핵심 특성은?\n심리적 갈등이나 스트레스를 ( ) 증상으로 전환하여 표현하는 경향을 측정한다.",opts:["신체적","행동적","망상적","경조증적"],ans:0,hint:"마음의 아픔이 몸의 아픔(신체화)으로 바뀌어 나타나는 현상이야.",exp:"3번 척도(Hy)의 핵심은 감당하기 어려운 심리적 갈등을 신체 통증이나 기능 이상으로 전환(conversion)하는 태도야. 전환장애의 대표 코드타입이 1-3 type인 이유가 바로 이것이야."},
  {q:"MMPI-2의 L(Lie) 척도가 현저히 상승하는 수검자의 특성으로 가장 알맞은 것은?",opts:["지능·교육 수준이 낮고 심리적 통찰력이 부족하며, 자신의 사소한 결점조차 인정하지 않으려 한다.","교육 수준과 SES가 높으며, 매우 세련된 방식으로 자신을 방어한다.","현재 겪고 있는 심리적 고통과 증상을 개방적으로 호소하고 있다.","반사회적 행동을 일삼으면서도 사회적 규범에 철저히 순응하는 척 연기한다."],ans:0,hint:"L 척도의 방어 방식은 다소 '순진하고 경직'되어 있어. K는 더 세련된 방어를 탐지해.",exp:"L 척도는 '대부분의 사람이 인정하는 사소한 결점'을 부인하는 경직되고 순진한 방어를 반영해. 교육수준이 높을수록 L은 낮고 K가 높은 경향이 있어."},
  {q:"정신적 갈등이 행동으로 직접 분출되는 경향을 뜻하며,\nMMPI-2에서 4번(Pd)과 9번(Ma) 척도가 동시에 상승했을 때 뚜렷하게 관찰되는\n이 임상적 특징을 무엇이라고 하는가?",opts:["행동화(Acting-out)","신체화(Somatization)","지성화(Intellectualization)","투사(Projection)"],ans:0,hint:"마음속 충동이나 반항심이 아무런 필터링 없이 '말이나 행동'으로 표출되는 현상이야.",exp:"4번(반사회성)과 9번(경조증)이 결합한 4-9/9-4 코드타입은 심리적 통제력이 낮아져 욕구나 분노를 참지 못하고 즉각적인 행동화(Acting-out)로 표출해. 사회적 기준·가치를 무시하고 다양한 일탈 행동에 관여하는 경향이 나타나."},
  {q:"MMPI-2 임상 척도 중 7번 척도(Pt, 정신쇠약)에 대한 설명으로 옳지 않은 것은?",opts:["주로 상태불안(State Anxiety)을 측정하여 현재 스트레스 상황을 반영한다.","강박적 우유부단, 완벽주의, 지성화 방어기제와 관련이 있다.","K교정이 적용되는 5개 척도 중 하나이다.","K 교정 비율은 전체 K 점수가 더해진다."],ans:0,hint:"7번 척도는 일시적 상황 불안이 아닌 기질적인 불안을 측정해.",exp:"7번 척도(Pt)는 만성적이고 기질적인 '특성불안(Trait Anxiety)'을 측정해. 상태불안은 일시적인 상황적 불안을 말하는데, 7번 척도와는 구별돼. 강박적 완벽주의, 지성화가 주요 특성이고, K교정에서 1K(전체 K점수)가 더해져."},
  {q:"MMPI-2 임상 척도 번호와 영문 약어 명칭의 연결이 바르게 짝지어진 것을 고르시오.",opts:["3번 - Hy (Hysteria)","1번 - Pd (Psychopathic Deviate)","4번 - Pa (Paranoia)","8번 - Pt (Psychasthenia)"],ans:0,hint:"3번 히스테리 척도의 영어 명칭 약자를 떠올려봐.",exp:"임상 척도 영문 약어: 1=Hs(건강염려증), 2=D(우울증), 3=Hy(히스테리), 4=Pd(반사회성), 5=Mf(남성성-여성성), 6=Pa(편집증), 7=Pt(정신쇠약), 8=Sc(조현병), 9=Ma(경조증), 0=Si(사회적 내향성)."},
  {q:"MMPI-2 임상 척도 2번(D, 우울증)의 점수가 높은 경우,\n외부 상황에 의해 일시적으로 유발되는 ( ① ) 우울보다\n성격적 기질이나 내적 요인에 깊이 뿌리내린 ( ② ) 우울과 더 깊이 연관된다.\n빈칸에 알맞은 단어 쌍은?",opts:["① 반응성, ② 내인성","① 내인성, ② 반응성","① 정신증적, ② 신경증적","① 경조증적, ② 만성적"],ans:0,hint:"외부 충격에 반응하여 생기는 우울 vs 내부 원인으로 발생하는 우울의 명칭이야.",exp:"2번 척도의 임상적 상승은 반응성 우울보다 내면 깊은 곳에서 기인한 내인성 우울증과 연관성이 높다고 해석해. 나이가 들수록 2번 척도도 상승하는 경향이 있어."},
  {q:"MMPI-2에서 코드타입 해석의 강점으로 옳은 것은?",opts:["코드타입으로 묶인 집단이 단일 척도 상승 집단보다 더 동질적이다.","코드타입은 진단명과 1:1로 대응한다.","5번과 0번 척도를 포함해야만 정의된 코드타입이다.","코드타입의 점수가 낮을수록 해석적 가설에 확신을 가진다."],ans:0,hint:"여러 척도를 동시에 고려할수록 해석의 정확성이 높아져.",exp:"코드타입은 2개 이상의 척도가 동시에 상승할 때 나타나는 패턴을 해석하는 방식이야. 단일 척도보다 더 동질적인 집단을 묶어주고, 경험적 상관물도 더 강력해. 단, 5번·0번은 전통적으로 코드타입에서 제외해."},
  {q:"MMPI-2에서 6-8/8-6 코드타입의 핵심 특징으로 옳은 것은?",opts:["피해망상·과대망상·환각 경험·비현실감 등 정신병적 증상 및 행동을 보인다.","신체 증상 호소와 함께 우울·불안·긴장이 동반된다.","사회적 기준을 무시하고 충동적인 일탈 행동에 반복적으로 관여한다.","전환 증상으로 인한 신체 통증과 심리적 부인이 강하게 나타난다."],ans:0,hint:"6번(편집증)과 8번(조현병)이 결합한 코드타입이야. 정신병적 색채가 짙어.",exp:"6-8/8-6은 타인에 대한 의심·불신과 기태적 사고, 사회적 소외, 현실검증력 손상 등 정신병적 증상이 가장 두드러지는 코드타입이야. 피해망상·과대망상·환각 경험이 나타날 수 있어."},
  {q:"MMPI-2에서 Conversion V(전환 V)는 어떤 척도 패턴인가?",opts:["1번과 3번이 높고 2번이 낮은 형태","2번과 7번이 높고 1번이 낮은 형태","6번과 8번이 높고 7번이 낮은 형태","4번과 9번이 높고 5번이 낮은 형태"],ans:0,hint:"신경증적 삼각형(Neurotic Triad)에서 가운데 척도만 낮은 V자 형태야.",exp:"Conversion V는 1번(Hs)과 3번(Hy)이 높고 2번(D)이 상대적으로 낮은 형태야. 심리적 갈등을 신체화로 해결하려는 경향을 반영해. 신경증적 삼각형(1-2-3) 중 2번이 낮아 'V' 형태가 만들어져."},
  {q:"MMPI-2 재구성 임상척도(RC) 개발의 핵심 목적은?\n기존 임상척도의 ( ① )문제와 ( ② )성 문제를 해결하기 위해 개발되었다.",opts:["① 문항 중복, ② 다차원","① 신뢰도, ② 단일차원","① 표준화, ② 규준","① 채점, ② 타당도"],ans:0,hint:"임상척도끼리 문항이 겹치고, 하나의 척도에 여러 심리적 차원이 섞인 문제야.",exp:"기존 임상척도는 문항이 서로 중복되어 척도 간 상관이 높고(예: 7번-8번 상관=.82), 하나의 척도 안에 여러 심리적 차원이 섞여 있는 다차원성 문제가 있었어. RC 척도는 의기소침 요인(Demoralization)을 제거하고 핵심 구성 개념을 분리해 변별력을 높였어."},
  {q:"MMPI-2 내용 척도 중 TRT가 높을 때 시사하는 임상적 의미는?",opts:["부정적 치료 지표 — 치료 변화에 대한 회의적 태도, 치료 동기 저하","반사회적 특성 — 사회 규범 무시와 법적 문제 연루","기태적 정신상태 — 환각·망상적 사고 경험","낮은 자존감 — 자기 비판적이고 자신감 부족"],ans:0,hint:"TRT = Treatment (치료) 관련 척도야.",exp:"TRT(부정적 치료지표) 척도가 높으면 심리치료에 대한 부정적 태도와 변화에 대한 회의감을 나타내. 상담자 입장에서 치료 동기와 예후를 평가할 때 중요한 척도야."},
  {q:"MMPI-2 임상 척도 9번(Ma, 경조증)이 단독으로 높게 상승했을 때의 해석 중 틀린 것은?",opts:["에너지가 낮고 무기력하며 사회적으로 위축된 상태를 나타낸다.","사고의 비약과 과대성, 충동적인 행동 경향을 보인다.","기분이 고양되고 활동이 증가하는 경향이 있다.","청소년에게서 성인보다 점수가 높게 나타나는 경향이 있다."],ans:0,hint:"Ma=경조증(Hypomania). 에너지가 '넘치는' 척도야, 부족한 게 아니야.",exp:"9번(Ma) 척도는 에너지 과잉, 사고 비약, 과대성, 충동성과 관련이 있어. 낮은 척도 점수일 때 무기력·위축이 나타나고, 높으면 과활동·충동 행동이 나타나. 나이가 들수록 감소하는 경향이 있어."},
  {q:"MMPI-2 해석 시 단일 척도 상승보다 코드타입(Code Type)을 활용하는 것이 바람직한 이유로\n가장 타당한 것은?",opts:["코드타입으로 확인된 경험적 상관물이 단일 척도 상관물보다 더 강력하다.","코드타입을 사용하면 수검자에게 진단명을 직접 부여할 수 있다.","코드타입 해석은 환자의 SES와 무관하게 동일하게 적용된다.","코드타입은 타당도 척도 검토를 생략할 수 있게 해준다."],ans:0,hint:"여러 척도 조합이 단일 척도보다 더 동질적이고 강력한 해석을 가능하게 해.",exp:"두 개 이상의 척도가 함께 상승한 집단은 단일 척도 상승 집단보다 더 동질적이고, 경험적으로 확인된 특성(상관물)도 더 강력해. 코드타입은 여러 변수의 복합적 패턴을 반영해 임상적 정확성을 높여."},
  {q:"MMPI-2에서 Harris-Lingoes 소척도를 활용하는 주된 목적은?",opts:["임상척도의 다차원성 문제를 해결하고 점수 상승의 원인을 세분화해 파악한다.","타당도 척도 대신 수검자의 방어성을 측정하기 위해 사용한다.","MMPI-2-RF를 대체하는 최신 척도 체계로 활용한다.","5번과 0번 척도의 세부 특성을 파악하기 위해 개발되었다."],ans:0,hint:"임상척도 하나에 여러 요인이 섞인 '다차원성' 문제를 세밀하게 들여다보는 도구야.",exp:"Harris-Lingoes 소척도는 2·3·4·6·8·9번 척도의 점수 상승 원인을 세분화해 파악하기 위해 개발됐어. 예를 들어 8번이 높을 때 사회적 소외 때문인지, 기태적 사고 때문인지를 구별할 수 있어. 해석은 해당 임상척도와 소척도 모두 65T 이상일 때만 적용해."},
  {q:"MMPI-2 해석 시 MMPI가 제공하는 정보의 성격에 대한 설명으로 가장 적절한 것은?",opts:["내담자의 문제에 대한 가설적 정보를 제공하며, 결정적 진술을 해주지는 않는다.","MMPI 결과만으로 DSM 진단을 확정 지을 수 있다.","해석집의 내용은 모든 내담자에게 동일하게 적용된다.","척도 점수가 임상 범위(65T 이상)이면 반드시 해당 장애를 가진 것으로 해석한다."],ans:0,hint:"해석집의 내용에 꼭 들어맞는 내담자는 거의 없어. 맥락과 함께 보는 게 원칙이야.",exp:"MMPI는 내담자 문제에 대한 가설적 정보를 제공할 뿐 결정적 진단을 내리지 않아. 의뢰사유, 현재 상황, 과거력, 직업, 종교적 배경, 교육, SES를 함께 고려해야 해."},
  {q:"MMPI-2에서 2-7/7-2 코드타입의 핵심 특징은?",opts:["만성적인 불안·초조·걱정과 함께 만성적인 우울이 동반된다.","피해망상과 환각을 동반한 정신병적 증상이 두드러진다.","사회적 기준을 무시하고 충동적인 일탈 행동을 반복한다.","신체 통증을 호소하며 심리적 문제를 부인하는 경향이 강하다."],ans:0,hint:"2번=우울, 7번=불안(강박). 우울장애·불안장애 대표 코드타입이야.",exp:"2-7/7-2는 만성적 우울과 불안·초조·긴장이 공존하는 형태로 우울장애·불안장애의 대표 코드타입이야. 걱정이 많고 완벽주의적이며, 심리치료 예후는 비교적 좋은 편이야."},
  {q:"MMPI-2에서 F 척도 T점수가 100 이상(비임상 집단 기준 80 이상)일 때\n가장 먼저 감별해야 할 세 가지 가능성을 바르게 나열한 것은?",opts:["무작위/고정 반응, 심각한 정신병리, Faking bad(증상 과장)","방어적 태도, 자아강도 높음, 긍정 왜곡","사회적 순응, 도덕성 과장, 세련된 방어","신체화, 지성화, 투사"],ans:0,hint:"F가 극단적으로 높으면 세 가지 해석 가능성을 먼저 감별해야 해.",exp:"F 척도가 매우 높을 때는 ① VRIN/TRIN이 높으면 불성실 응답(무작위·고정 반응), ② VRIN/TRIN이 정상이면서 F(p)도 높으면 Faking bad(의도적 증상 과장), ③ 두 가지 모두 정상이면 실제 심각한 정신병리를 먼저 고려해야 해."},

  {q:"MMPI-2 임상 척도 중 8번 척도(Sc, 조현병)가 높을 때\n해석 시 주의해야 할 점으로 가장 적절한 것은?",opts:["8번 척도가 높다고 해서 반드시 조현병이라 할 수 없으며, 무감동·소외감·철학적 흥미·기태적 사고 등으로 기술해야 한다.","8번 척도가 65T 이상이면 조현병으로 진단 확정한다.","8번 척도는 타당도 척도와 무관하게 독립적으로 해석 가능하다.","8번 척도는 나이가 들수록 점수가 상승하는 경향이 있다."],ans:0,hint:"척도 명칭이 '조현병'이라도, 그게 곧 진단은 아니야.",exp:"8번 척도의 이름이 '조현병 척도'이지만, 임상적 상승이 반드시 조현병을 의미하지는 않아. 무감동, 소외감, 철학적 흥미, 좋지 않은 가족관계, 특이한 사고과정 등 다양한 가능성을 고려해야 해. 8번은 나이가 들수록 감소하는 경향이 있어."},
  {q:"MMPI-2의 동형(Uniform) T점수 체계를 도입한 가장 주된 이유는?",opts:["임상 척도 간에 동일한 T점수 분포를 갖게 하여 척도 간 비교가 가능하도록 하기 위해","T점수를 K교정 없이 산출하기 위해","정신과 환자와 일반인을 더 쉽게 구별하기 위해","원점수를 그대로 보존하여 해석 왜곡을 막기 위해"],ans:0,hint:"서로 다른 척도끼리 T점수로 직접 비교할 수 있게 해주는 게 핵심이야.",exp:"원판 MMPI는 척도마다 분포가 달라 T점수 비교가 불가능했어. MMPI-2에서 도입한 동형 T점수는 임상척도 간 동일한 범위와 분포를 확보해 T점수끼리 직접 비교할 수 있게 됐어."},
  {q:"MMPI-2에서 검사 수행 시간이 정상(90분)보다 30분 이상 길어졌을 때\n의심할 수 있는 원인으로 옳지 않은 것은?",opts:["수검자가 의도적으로 Faking bad를 시도하고 있다.","심각한 우울증이나 정신증이 동반된 심리장애가 있다.","강박적 우유부단 경향이 있다.","독해력이 부족하거나 평균 이하의 지능 수준이다."],ans:0,hint:"시간이 너무 길어지는 건 주로 인지적 문제나 병리적 상태 때문이야. Faking bad는 보통 더 빨리 마치는 경향이 있어.",exp:"검사 시간이 지나치게 길어지는 이유는 심각한 우울증·정신증, 뇌 손상, 강박적 우유부단, 독해력 부족이야. 반대로 Faking bad를 의도하는 경우에는 오히려 빠르게 답하거나, 불성실하게 응답해 시간이 짧아질 수 있어."}

/* ================================================================
   상태
================================================================ */
let curTab = 't30';
let answered30 = {};
let state120 = {};
let activeFilter = '전체';
const cats120 = ['전체', ...new Set(QS120.map(q => q.cat))];

function init120(){
  state120 = {};
  QS120.forEach(q => { state120[q.id] = {answered:false, correct:null}; });
}

/* ================================================================
   탭 전환
================================================================ */
function switchTab(tab){
  curTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active', (i===0&&tab==='t30')||(i===1&&tab==='t120'));
  });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');

  const btnFirst = document.getElementById('btn-first');
  const btnNext  = document.getElementById('btn-next');
  if(tab==='t120'){
    btnFirst.classList.remove('btn-hidden');
    btnNext.classList.remove('btn-hidden');
  } else {
    btnFirst.classList.add('btn-hidden');
    btnNext.classList.add('btn-hidden');
  }
  updateStats();
}

/* ================================================================
   공통 진도바 업데이트
================================================================ */
function updateStats(){
  let done, correct, wrong, total;
  if(curTab==='t30'){
    total = QS30.length;
    done = Object.keys(answered30).length;
    correct = Object.values(answered30).filter(v=>v).length;
    wrong = done - correct;
  } else {
    const filtered = QS120.filter(q=>activeFilter==='전체'||q.cat===activeFilter);
    total = filtered.length;
    done = filtered.filter(q=>state120[q.id].answered).length;
    correct = filtered.filter(q=>state120[q.id].correct).length;
    wrong = done - correct;
  }
  document.getElementById('sc').textContent = correct;
  document.getElementById('wc').textContent = wrong;
  document.getElementById('rc').textContent = total - done;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('prog').style.width = pct+'%';
  document.getElementById('prog-text').textContent = `${done} / ${total} 완료`;
  document.getElementById('prog-pct').textContent = pct+'%';
}

/* ================================================================
   30문제 로직
================================================================ */
function toggleHint(i){
  const box = document.getElementById(`hint-${i}`);
  const btn  = document.getElementById(`hbtn-${i}`);
  const show = !box.style.display || box.style.display==='none';
  box.style.display = show?'block':'none';
  btn.textContent = show?'💡 힌트 숨기기':'💡 힌트 보기';
}

function choose30(qIdx, optIdx){
  if(answered30[qIdx] !== undefined) return;
  const q = QS30[qIdx];
  const correct = optIdx === q.ans;
  answered30[qIdx] = correct;

  const btns = document.querySelectorAll(`.opt30-${qIdx}`);
  btns.forEach((btn,i)=>{
    btn.disabled = true;
    if(i===q.ans) btn.classList.add('reveal');
    if(i===optIdx && !correct) btn.classList.add('wrong');
    if(i===optIdx && correct)  btn.classList.add('correct');
  });

  const rbox = document.getElementById(`res30-${qIdx}`);
  rbox.className = `result-box ${correct?'correct':'wrong'}`;
  rbox.innerHTML = `<div class="result-label">${correct?'✅ 정답!':'❌ 오답'}</div>${q.exp}`;
  rbox.style.display = 'block';

  const card = document.getElementById(`card30-${qIdx}`);
  card.className = `q-card ${correct?'c-correct':'c-wrong'}`;

  const done = Object.keys(answered30).length;
  if(done === QS30.length){
    const cor = Object.values(answered30).filter(v=>v).length;
    const banner = document.getElementById('done-banner');
    banner.style.display = 'block';
    document.getElementById('done-sub').textContent = `맞음 ${cor}문항 / 틀림 ${done-cor}문항 — 정답률 ${Math.round(cor/QS30.length*100)}%`;
    banner.scrollIntoView({behavior:'smooth',block:'start'});
  }
  updateStats();
}

function build30(){
  const list = document.getElementById('q-list');
  list.innerHTML = QS30.map((q,i)=>`
    <div class="q-card" id="card30-${i}">
      <div class="q-num">Q${i+1}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.opts.map((o,j)=>`<button class="opt-btn opt30-${i}" onclick="choose30(${i},${j})">${String.fromCharCode(9312+j)} ${o}</button>`).join('')}
      </div>
      <button class="hint-toggle" id="hbtn-${i}" onclick="toggleHint(${i})">💡 힌트 보기</button>
      <div class="hint-box" id="hint-${i}">${q.hint}</div>
      <div class="result-box" id="res30-${i}"></div>
    </div>
  `).join('');
}

/* ================================================================
   120문제 로직
================================================================ */
function buildFilters(){
  const el = document.getElementById('filters');
  el.innerHTML = cats120.map(c=>`<button class="filter-btn ${c===activeFilter?'active':''}" onclick="setFilter120('${c}')">${c}${c==='전체'?` (${QS120.length})`:`(${QS120.filter(q=>q.cat===c).length})`}</button>`).join('');
}

function setFilter120(cat){
  activeFilter = cat;
  buildFilters();
  render120();
  updateStats();
}

function normalizeAns(s){
  return s.toLowerCase().replace(/[\s\(\)\[\]·,、。]/g,'');
}

function checkBlank120(id){
  const q = QS120.find(q=>q.id===id);
  const vals = q.blanks.map((_,i)=>{
    const el = document.getElementById(`inp-${id}-${i}`);
    return el?el.value.trim():'';
  });
  const correct = q.blanks.every((ans,i)=>{
    const v = normalizeAns(vals[i]);
    const a = normalizeAns(ans);
    return v===a || a.includes(v) || v.includes(a);
  });
  state120[id] = {answered:true, correct};
  q.blanks.forEach((_,i)=>{
    const el = document.getElementById(`inp-${id}-${i}`);
    if(el){el.classList.add(correct?'inp-ok':'inp-ng');el.disabled=true;}
  });
  showFeedback120(id,correct,q.hint,q.blanks);
  const cb = document.getElementById(`check-${id}`);
  if(cb) cb.style.display='none';
  document.getElementById(`card-${id}`).className=`card ${correct?'answered-correct':'answered-wrong'}`;
  updateStats();
}

function checkChoice120(id,choice){
  const q = QS120.find(q=>q.id===id);
  const correct = choice===q.ans;
  state120[id] = {answered:true, correct};
  document.querySelectorAll(`.ch-${id}`).forEach(btn=>{
    btn.disabled=true;
    if(btn.dataset.val===q.ans) btn.classList.add('reveal');
    if(btn.dataset.val===choice && !correct) btn.classList.add('selected-ng');
    if(btn.dataset.val===choice && correct)  btn.classList.add('selected-ok');
  });
  showFeedback120(id,correct,q.hint,[q.ans]);
  document.getElementById(`card-${id}`).className=`card ${correct?'answered-correct':'answered-wrong'}`;
  updateStats();
}

function showFeedback120(id,correct,hint,answers){
  const fb = document.getElementById(`fb-${id}`);
  if(!fb) return;
  const ansHtml = answers.map(a=>`<span class="ans-badge">${a}</span>`).join(', ');
  fb.className = `feedback ${correct?'ok':'ng'}`;
  fb.innerHTML = correct
    ?`✓ 정답!${hint?`<div class="hint-text">${hint}</div>`:''}`
    :`✗ 정답: ${ansHtml}${hint?`<div class="hint-text">${hint}</div>`:''}`;
  fb.style.display='block';
}

function renderCard120(q){
  const s = state120[q.id];
  const answered = s.answered;
  const cardCls = answered?(s.correct?'card answered-correct':'card answered-wrong'):'card';
  let qHtml = q.q;
  let inputHtml = '';

  if(q.type==='빈칸'){
    qHtml = q.q.replace(/<b>\[ \]<\/b>/g,()=>`<span class="blank-marker">  </span>`);
    if(!answered){
      inputHtml = `<div class="input-area">
        ${q.blanks.map((_,i)=>`<div class="inp-row">
          ${q.blanks.length>1?`<span class="inp-label">빈칸${i+1}</span>`:''}
          <input class="q-input" id="inp-${q.id}-${i}" placeholder="${i+1}번 빈칸 입력" autocomplete="off"
            onkeydown="if(event.key==='Enter'){if(${i}===${q.blanks.length-1})checkBlank120(${q.id});else{const nx=document.getElementById('inp-${q.id}-${i+1}');if(nx)nx.focus();}}" />
        </div>`).join('')}
        <button class="check-btn" id="check-${q.id}" onclick="checkBlank120(${q.id})">정답 확인</button>
      </div>`;
    }
  } else {
    const shuffled = [...q.choices].sort(()=>Math.random()-.5);
    if(!answered){
      inputHtml = `<div class="choices">${shuffled.map(c=>`<button class="choice-btn ch-${q.id}" data-val="${c}" onclick="checkChoice120(${q.id},'${c.replace(/'/g,"\\'")}')">
        ${c}
      </button>`).join('')}</div>`;
    }
  }

  return `<div class="${cardCls}" id="card-${q.id}">
    <div class="card-meta">
      <span class="tag tag-cat">${q.cat}</span>
      <span class="tag tag-type">${q.type}</span>
      <span class="qnum">Q${q.id}</span>
    </div>
    <div class="question">${qHtml}</div>
    ${inputHtml}
    <div class="feedback" id="fb-${q.id}" style="display:none"></div>
  </div>`;
}

function render120(){
  const filtered = QS120.filter(q=>activeFilter==='전체'||q.cat===activeFilter);
  const list = document.getElementById('list');
  if(!filtered.length){list.innerHTML='<div class="empty-msg">해당 카테고리의 문제가 없습니다.</div>';return;}
  list.innerHTML = filtered.map(renderCard120).join('');
}

function scrollToFirst(){
  const filtered = QS120.filter(q=>activeFilter==='전체'||q.cat===activeFilter);
  document.getElementById(`card-${(filtered[0]||QS120[0]).id}`)?.scrollIntoView({behavior:'smooth',block:'start'});
}

function scrollToNext(){
  const filtered = QS120.filter(q=>activeFilter==='전체'||q.cat===activeFilter);
  const next = filtered.find(q=>!state120[q.id].answered);
  if(next){
    document.getElementById(`card-${next.id}`)?.scrollIntoView({behavior:'smooth',block:'start'});
  } else {
    alert('🎉 모든 문제를 풀었어요!');
  }
}

/* ================================================================
   초기화
================================================================ */
function confirmReset(){
  if(!confirm('모든 답을 초기화할까요?')) return;
  if(curTab==='t30'){
    answered30 = {};
    document.getElementById('done-banner').style.display='none';
    build30();
  } else {
    init120();
    render120();
    buildFilters();
  }
  updateStats();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ================================================================
   초기 실행
================================================================ */
init120();
build30();
buildFilters();
render120();
updateStats();
</script>
