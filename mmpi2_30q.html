<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MMPI-2 심화">
<title>MMPI-2 심화 30문항</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f0f2f5;min-height:100vh;padding:0 0 60px;}

.header{background:#2c3e50;color:#fff;padding:18px 20px 14px;position:sticky;top:0;z-index:50;}
.header-title{font-size:16px;font-weight:700;margin-bottom:8px;}
.progress-bar{height:5px;background:rgba(255,255,255,.2);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:#3498db;border-radius:3px;transition:width .4s;}
.progress-text{font-size:12px;color:rgba(255,255,255,.7);margin-top:6px;display:flex;justify-content:space-between;}

.main{max-width:720px;margin:0 auto;padding:16px 14px;}

.q-card{background:#fff;border-radius:14px;padding:22px 18px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.q-num{display:inline-block;background:#2c3e50;color:#fff;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:12px;}
.q-text{font-size:15px;font-weight:600;line-height:1.8;color:#2c3e50;white-space:pre-line;margin-bottom:16px;}

.options{display:flex;flex-direction:column;gap:9px;}
.opt-btn{background:#f8f9fa;border:2px solid #e9ecef;padding:13px 15px;border-radius:10px;text-align:left;font-size:14px;line-height:1.55;cursor:pointer;transition:all .18s;color:#333;width:100%;}
.opt-btn:hover:not(:disabled){background:#eaf4fd;border-color:#3498db;}
.opt-btn.correct{background:#d4edda;border-color:#28a745;color:#155724;font-weight:700;}
.opt-btn.wrong{background:#f8d7da;border-color:#dc3545;color:#721c24;}
.opt-btn.reveal{background:#d4edda;border-color:#28a745;color:#155724;font-weight:700;}
.opt-btn:disabled{cursor:default;}

.hint-toggle{margin-top:12px;background:none;border:none;color:#e67e22;font-size:13px;font-weight:700;cursor:pointer;padding:0;display:flex;align-items:center;gap:5px;}
.hint-box{margin-top:10px;background:#fef9e7;border-left:4px solid #f39c12;padding:11px 14px;border-radius:6px;font-size:13px;line-height:1.65;display:none;color:#7d4e00;}

.result-box{margin-top:14px;padding:15px;border-radius:10px;font-size:14px;line-height:1.7;display:none;white-space:pre-line;}
.result-box.correct{background:#d4edda;color:#155724;border:1px solid #c3e6cb;}
.result-box.wrong{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb;}
.result-label{font-weight:800;font-size:15px;margin-bottom:6px;}

.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;gap:8px;z-index:50;}
.score-pill{font-size:13px;font-weight:700;padding:6px 14px;border-radius:20px;background:#f0f2f5;color:#2c3e50;white-space:nowrap;}
.score-pill span{color:#27ae60;}
.score-pill span.wrong-c{color:#e74c3c;}
.reset-btn{font-size:13px;padding:8px 16px;border-radius:8px;border:none;background:#2c3e50;color:#fff;cursor:pointer;font-weight:600;}
.reset-btn:active{opacity:.75;}

.done-banner{display:none;background:#fff;border-radius:14px;padding:30px 20px;text-align:center;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.done-emoji{font-size:48px;margin-bottom:12px;}
.done-title{font-size:20px;font-weight:800;color:#2c3e50;margin-bottom:8px;}
.done-sub{font-size:14px;color:#7f8c8d;}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">📝 MMPI-2 심화 30문항</div>
  <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
  <div class="progress-text">
    <span id="prog-text">0 / 30 완료</span>
    <span id="prog-pct">0%</span>
  </div>
</div>

<div class="main">
  <div class="done-banner" id="done-banner">
    <div class="done-emoji">🎉</div>
    <div class="done-title">전체 완료!</div>
    <div class="done-sub" id="done-sub"></div>
  </div>
  <div id="q-list"></div>
</div>

<div class="bottom-bar">
  <div class="score-pill">맞음 <span id="sc">0</span> &nbsp;틀림 <span class="wrong-c" id="wc">0</span> &nbsp;남음 <span id="rc">30</span></div>
  <button class="reset-btn" onclick="confirmReset()">↺ 초기화</button>
</div>

<script>
const QS = [
  {
    q:"MMPI-2 타당도 척도 중 전반부의 비전형적 응답 태도를 측정하는 척도는 ( ① )이고,\n281번 문항 이후 후반부의 비전형적 응답을 탐지하는 척도는 ( ② )이다.\n알맞은 척도 기호를 순서대로 고르시오.",
    opts:["① F, ② Fb","① Fb, ② F","① VRIN, ② TRIN","① L, ② K"],
    ans:0,
    hint:"F는 비전형(Infrequency) 전반부, b는 Back의 약자로 후반부를 뜻해.",
    exp:"F 척도는 검사 전반부(1~370번)의 비전형 반응을, Fb 척도는 281번 이후 후반부의 비전형 반응을 측정해. 수검자가 후반부에 피로하거나 대충 응답했는지를 탐지하는 데 특히 유용해."
  },
  {
    q:"수검자가 문항 내용을 고려하지 않고 무작위로 응답했는지를 탐지하는 [무선반응 비일관성] 척도는 ( ① )이며,\n'전부 그렇다' 혹은 '전부 아니다'처럼 고정된 방식으로 응답했는지 탐지하는 [고정반응 비일관성] 척도는 ( ② )이다.",
    opts:["① VRIN, ② TRIN","① TRIN, ② VRIN","① F(p), ② S","① L, ② K"],
    ans:0,
    hint:"V는 Variable(무선적), T는 True/Fixed(고정)를 연상해봐.",
    exp:"VRIN은 무작위 응답(Variable Response Inconsistency)을, TRIN은 고정 반응(True Response Inconsistency)을 정밀하게 탐지해. 둘 다 80T 이상이면 프로파일 해석이 불가능해."
  },
  {
    q:"MMPI-2 임상 척도 중 K 척도(교정 척도)의 점수를 더하여 보정(K-correction)하는\n5가지 임상 척도의 번호를 모두 고르시오.",
    opts:["1번, 4번, 7번, 8번, 9번","1번, 2번, 3번, 4번, 6번","2번, 3번, 5번, 7번, 8번","3번, 4번, 5번, 6번, 0번"],
    ans:0,
    hint:"첫 번째 구간(1번)과 중간~후반부(4·7·8·9번)에 집중되어 있어.",
    exp:"K 교정은 1(Hs), 4(Pd), 7(Pt), 8(Sc), 9(Ma)번 척도에만 적용돼. 방어적으로 응답한 수검자의 임상 점수를 보정하기 위해 K점수의 일정 비율을 더해. 5번과 0번은 절대 포함되지 않아 — 시험 단골 오답지야."
  },
  {
    q:"자신을 실제보다 더 나쁘게 보이려고 증상을 과장하는 것을 [부정 왜곡(Fake-bad)]이라 한다.\n부정 왜곡을 탐지하는 'F 계열' 타당도 척도 3가지를 고르시오.",
    opts:["F, Fb, F(p)","L, K, S","VRIN, TRIN, S","RC1, RC4, RC7"],
    ans:0,
    hint:"글자 'F'가 들어가는 세 가지 핵심 타당도 척도를 떠올려봐.",
    exp:"F(비전형), Fb(비전형-후반부), F(p)(비전형-정신병리) 척도는 모두 증상 과장이나 Faking bad를 탐지해. 반면 L·K·S는 긍정 왜곡(Faking good) 계열이야."
  },
  {
    q:"MMPI-2 타당도 프로파일에서 L과 K 척도는 70 이상으로 높고,\nF 척도는 45 이하로 낮은 ( )자 형태를 보일 때,\n이를 '자신을 가급적 건강하고 도덕적으로 보이려는 방어적 태도(긍정 왜곡)'로 해석한다.\n빈칸에 알맞은 알파벳 모양은?",
    opts:["V","역V","삿갓","일직선"],
    ans:0,
    hint:"L(높음) – F(낮음) – K(높음)의 그래프 모양을 머릿속으로 연결해봐.",
    exp:"양쪽의 L과 K가 높고 가운데 F가 낮으므로 시각적으로 'V'자 모양을 형성해. Faking good 혹은 방어적 태도를 나타내며, 경사가 심할수록 의도적 왜곡 가능성이 높아."
  },
  {
    q:"MMPI-2 실시 시 무응답(?) 항목이 최소 몇 개 이상일 때\n프로파일 결과 해석을 하지 않거나 지양하는 것이 원칙인가?",
    opts:["30개","10개","20개","50개"],
    ans:0,
    hint:"앞자리가 '3'으로 시작하는 십 단위 숫자야.",
    exp:"무응답(?) 척도가 30개 이상이면 프로파일이 무효일 것으로 보아 해석을 지양해. 11~29개는 무효일 수 있으므로 주의해서 해석하고, 10개 이하는 유효한 것으로 본다."
  },
  {
    q:"자신을 매우 도덕적이고 적응적인 사람으로 표현하려는 '성인군자' 같은 태도를 광범위하게 측정하며,\n일명 '과장된 자기제시'라고 불리는 타당도 척도의 기호는?",
    opts:["S","L","K","FBS"],
    ans:0,
    hint:"Superlative(최상급의, 과장된)의 첫 글자를 따온 척도야.",
    exp:"S 척도(Superlative Self-Presentation)는 항공사 조종사 지원자 데이터를 기반으로 개발됐어. K와 상관이 매우 높으며, 자신을 완벽하게 도덕적이고 문제없는 사람으로 제시하려는 욕구를 광범위하게 평가해."
  },
  {
    q:"정신과 환자들도 거의 응답하지 않는 매우 특이한 응답을 찾아내어,\n실제 환자군과도 차별화되는 과장된 증상 보고나 꾀병(Fake-bad)을 정밀하게 탐지하는\n타당도 척도의 기호는?",
    opts:["F(p)","Fb","TRIN","S"],
    ans:0,
    hint:"F 계열 중에서도 '정신병리(Psychopathology)'를 뜻하는 소괄호 알파벳이 붙어 있어.",
    exp:"F(p) 척도(비전형-정신병리)는 규준집단과 외래환자 모두에서 비전형적인 반응으로 구성된 27개 문항으로 이뤄져. F 척도에 비해 정신병리에 덜 민감하므로, 진짜 정신과 환자인지 꾀병인지를 더 잘 구별해줘."
  },
  {
    q:"MMPI-2 결과 해석 순서 중 가장 먼저 수행해야 할 단계는?\n\n[ ( ① ) 척도 검토 ] → [ 임상척도 및 코드타입 해석 ] → [ 내용·보충 척도 해석 ]",
    opts:["① 타당도","① 재구성 임상(RC)","① 성격병리(PSY-5)","① 내용"],
    ans:0,
    hint:"검사 결과 자체가 믿을 만한지, 왜곡 여부를 먼저 체크하는 단계야.",
    exp:"타당도 척도를 최우선으로 검토해 프로파일의 신뢰성을 확보하는 것이 원칙이야. 타당하지 않은 프로파일을 임상 척도로 해석하면 오류가 발생해."
  },
  {
    q:"MMPI-2 임상 척도 중 3번 척도(Hy, 히스테리)가 측정하는 핵심 특성은?\n심리적 갈등이나 스트레스를 ( ) 증상으로 전환하여 표현하는 경향을 측정한다.",
    opts:["신체적","행동적","망상적","경조증적"],
    ans:0,
    hint:"마음의 아픔이 몸의 아픔(신체화)으로 바뀌어 나타나는 현상이야.",
    exp:"3번 척도(Hy)의 핵심은 감당하기 어려운 심리적 갈등을 신체 통증이나 기능 이상으로 전환(conversion)하는 태도야. 전환장애의 대표 코드타입이 1-3 type인 이유가 바로 이것이야."
  },
  {
    q:"MMPI-2의 L(Lie) 척도가 현저히 상승하는 수검자의 특성으로 가장 알맞은 것은?",
    opts:[
      "지능·교육 수준이 낮고 심리적 통찰력이 부족하며, 자신의 사소한 결점조차 인정하지 않으려 한다.",
      "교육 수준과 SES가 높으며, 매우 세련된 방식으로 자신을 방어한다.",
      "현재 겪고 있는 심리적 고통과 증상을 개방적으로 호소하고 있다.",
      "반사회적 행동을 일삼으면서도 사회적 규범에 철저히 순응하는 척 연기한다."
    ],
    ans:0,
    hint:"L 척도의 방어 방식은 다소 '순진하고 경직'되어 있어. K는 더 세련된 방어를 탐지해.",
    exp:"L 척도는 '대부분의 사람이 인정하는 사소한 결점'을 부인하는 경직되고 순진한 방어를 반영해. 교육수준이 높을수록 L은 낮고 K가 높은 경향이 있어."
  },
  {
    q:"정신적 갈등이 행동으로 직접 분출되는 경향을 뜻하며,\nMMPI-2에서 4번(Pd)과 9번(Ma) 척도가 동시에 상승했을 때 뚜렷하게 관찰되는\n이 임상적 특징을 무엇이라고 하는가?",
    opts:["행동화(Acting-out)","신체화(Somatization)","지성화(Intellectualization)","투사(Projection)"],
    ans:0,
    hint:"마음속 충동이나 반항심이 아무런 필터링 없이 '말이나 행동'으로 표출되는 현상이야.",
    exp:"4번(반사회성)과 9번(경조증)이 결합한 4-9/9-4 코드타입은 심리적 통제력이 낮아져 욕구나 분노를 참지 못하고 즉각적인 행동화(Acting-out)로 표출해. 사회적 기준·가치를 무시하고 다양한 일탈 행동에 관여하는 경향이 나타나."
  },
  {
    q:"MMPI-2 임상 척도 중 7번 척도(Pt, 정신쇠약)에 대한 설명으로 옳지 않은 것은?",
    opts:[
      "주로 상태불안(State Anxiety)을 측정하여 현재 스트레스 상황을 반영한다.",
      "강박적 우유부단, 완벽주의, 지성화 방어기제와 관련이 있다.",
      "K교정이 적용되는 5개 척도 중 하나이다.",
      "K 교정 비율은 전체 K 점수가 더해진다."
    ],
    ans:0,
    hint:"7번 척도는 일시적 상황 불안이 아닌 기질적인 불안을 측정해.",
    exp:"7번 척도(Pt)는 만성적이고 기질적인 '특성불안(Trait Anxiety)'을 측정해. 상태불안은 일시적인 상황적 불안을 말하는데, 7번 척도와는 구별돼. 강박적 완벽주의, 지성화가 주요 특성이고, K교정에서 1K(전체 K점수)가 더해져."
  },
  {
    q:"MMPI-2 임상 척도 번호와 영문 약어 명칭의 연결이 바르게 짝지어진 것을 고르시오.",
    opts:[
      "3번 - Hy (Hysteria)",
      "1번 - Pd (Psychopathic Deviate)",
      "4번 - Pa (Paranoia)",
      "8번 - Pt (Psychasthenia)"
    ],
    ans:0,
    hint:"3번 히스테리 척도의 영어 명칭 약자를 떠올려봐.",
    exp:"임상 척도 영문 약어: 1=Hs(건강염려증), 2=D(우울증), 3=Hy(히스테리), 4=Pd(반사회성), 5=Mf(남성성-여성성), 6=Pa(편집증), 7=Pt(정신쇠약), 8=Sc(조현병), 9=Ma(경조증), 0=Si(사회적 내향성)."
  },
  {
    q:"MMPI-2 임상 척도 2번(D, 우울증)의 점수가 높은 경우,\n외부 상황에 의해 일시적으로 유발되는 ( ① ) 우울보다\n성격적 기질이나 내적 요인에 깊이 뿌리내린 ( ② ) 우울과 더 깊이 연관된다.\n빈칸에 알맞은 단어 쌍은?",

    exp:"검사 시간이 지나치게 길어지는 이유는 심각한 우울증·정신증, 뇌 손상, 강박적 우유부단, 독해력 부족이야. 반대로 Faking bad를 의도하는 경우에는 오히려 빠르게 답하거나, 불성실하게 응답해 시간이 짧아질 수 있어."
  }
];

let answered = {};

function updateStats(){
  const done = Object.keys(answered).length;
  const correct = Object.values(answered).filter(v=>v).length;
  const wrong = done - correct;
  document.getElementById('sc').textContent = correct;
  document.getElementById('wc').textContent = wrong;
  document.getElementById('rc').textContent = QS.length - done;
  const pct = Math.round(done/QS.length*100);
  document.getElementById('prog').style.width = pct+'%';
  document.getElementById('prog-text').textContent = `${done} / ${QS.length} 완료`;
  document.getElementById('prog-pct').textContent = pct+'%';
  if(done === QS.length){
    const banner = document.getElementById('done-banner');
    banner.style.display='block';
    document.getElementById('done-sub').textContent = `맞음 ${correct}문항 / 틀림 ${wrong}문항 — 정답률 ${Math.round(correct/QS.length*100)}%`;
    banner.scrollIntoView({behavior:'smooth',block:'start'});
  }
}

function toggleHint(i){
  const box = document.getElementById(`hint-${i}`);
  const btn = document.getElementById(`hbtn-${i}`);
  const show = box.style.display==='none'||!box.style.display;
  box.style.display = show?'block':'none';
  btn.textContent = show?'💡 힌트 숨기기':'💡 힌트 보기';
}

function choose(qIdx, optIdx){
  if(answered[qIdx] !== undefined) return;
  const q = QS[qIdx];
  const correct = optIdx === q.ans;
  answered[qIdx] = correct;

  const btns = document.querySelectorAll(`.opt-${qIdx}`);
  btns.forEach((btn, i)=>{
    btn.disabled = true;
    if(i === q.ans) btn.classList.add('reveal');
    if(i === optIdx && !correct) btn.classList.add('wrong');
    if(i === optIdx && correct) btn.classList.add('correct');
  });

  const rbox = document.getElementById(`res-${qIdx}`);
  rbox.className = `result-box ${correct?'correct':'wrong'}`;
  rbox.innerHTML = `<div class="result-label">${correct?'✅ 정답!':'❌ 오답'}</div>${q.exp}`;
  rbox.style.display='block';

  const card = document.getElementById(`card-${qIdx}`);
  card.style.borderLeft = `4px solid ${correct?'#28a745':'#dc3545'}`;

  updateStats();
}

function buildAll(){
  const list = document.getElementById('q-list');
  list.innerHTML = QS.map((q,i)=>`
    <div class="q-card" id="card-${i}" style="border-left:4px solid #e9ecef;">
      <div class="q-num">Q${i+1}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.opts.map((o,j)=>`<button class="opt-btn opt-${i}" onclick="choose(${i},${j})">${String.fromCharCode(9312+j)} ${o}</button>`).join('')}
      </div>
      <button class="hint-toggle" id="hbtn-${i}" onclick="toggleHint(${i})">💡 힌트 보기</button>
      <div class="hint-box" id="hint-${i}">${q.hint}</div>
      <div class="result-box" id="res-${i}"></div>
    </div>
  `).join('');
}

function confirmReset(){
  if(confirm('모든 답을 초기화할까요?')){
    answered={};
    document.getElementById('done-banner').style.display='none';
    buildAll();
    updateStats();
    window.scrollTo({top:0,behavior:'smooth'});
  }
}

buildAll();
updateStats();
</script>
</body>
</html>
