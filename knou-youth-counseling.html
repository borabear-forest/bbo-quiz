<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>청소년상담</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap');

:root {
  --bg: #f7f4ef;
  --paper: #fffefb;
  --ink: #1c1a17;
  --muted: #7a7268;
  --line: #e3ddd4;
  --accent: #1a3258;
  --soft: #eaeff6;
  --radius: 14px;
  --shadow: 0 2px 16px rgba(28,26,23,.07);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.65;
  min-height: 100vh;
}

header {
  background: var(--ink);
  color: #fff;
  padding: 22px 24px 18px;
  text-align: center;
}
.header-back {
  display: inline-block;
  margin-bottom: 8px;
  font-size: 12px;
  font-weight: 700;
  color: rgba(255,255,255,.4);
  text-decoration: none;
  letter-spacing: .06em;
  transition: color .15s;
}
.header-back:hover { color: rgba(255,255,255,.8); }
header h1 {
  font-family: 'Noto Serif KR', serif;
  font-size: clamp(18px, 3.5vw, 26px);
  letter-spacing: -.03em;
}

/* ── 목차 ── */
.toc-wrap {
  max-width: 720px;
  margin: 0 auto;
  padding: 36px 16px 80px;
}
.toc-section-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--ink);
}
.toc-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toc-item {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  box-shadow: var(--shadow);
  cursor: default;
}
.toc-num {
  font-size: 13px;
  font-weight: 900;
  color: var(--muted);
  letter-spacing: .04em;
  min-width: 24px;
}
.toc-label {
  flex: 1;
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  word-break: keep-all;
}
.toc-btn {
  flex-shrink: 0;
  background: none;
  border: 1.5px solid var(--accent);
  border-radius: 999px;
  padding: 5px 14px;
  font-size: 12px;
  font-weight: 700;
  font-family: inherit;
  color: var(--accent);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  touch-action: manipulation;
}
.toc-btn:hover { background: var(--accent); color: #fff; }
.toc-btn.wip {
  border-color: var(--line);
  color: var(--muted);
  cursor: default;
  pointer-events: none;
}

/* ── 문제 페이지 ── */
.quiz-wrap {
  max-width: 720px;
  margin: 0 auto;
  padding: 32px 16px 80px;
  display: none;
}
.quiz-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
  padding-bottom: 14px;
  border-bottom: 2px solid var(--ink);
}
.quiz-back {
  background: none;
  border: 1.5px solid var(--line);
  border-radius: 999px;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 700;
  font-family: inherit;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.quiz-back:hover { border-color: var(--accent); color: var(--accent); }
.quiz-ch-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -.03em;
  word-break: keep-all;
}

.qcard {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 20px 22px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.q-num {
  font-size: 11px;
  font-weight: 900;
  color: var(--muted);
  letter-spacing: .08em;
  margin-bottom: 8px;
}
.q-body {
  font-size: 15px;
  line-height: 1.75;
  white-space: pre-wrap;
  font-family: 'Noto Sans KR', sans-serif;
  word-break: keep-all;
  overflow-wrap: break-word;
}
.answer-btn {
  margin-top: 14px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 15px;
  border-radius: 999px;
  border: 1.5px solid var(--accent);
  background: transparent;
  color: var(--accent);
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all .15s;
  touch-action: manipulation;
}
.answer-btn:hover { background: var(--soft); }
.answer-btn.open { background: var(--accent); color: #fff; }
.answer-box {
  display: none;
  margin-top: 12px;
  padding: 14px 16px;
  background: var(--soft);
  border-radius: 12px;
  border: 1px solid #a8bed8;
  font-size: 14px;
  line-height: 1.75;
  white-space: pre-wrap;
  word-break: keep-all;
  overflow-wrap: break-word;
}
.answer-box.visible { display: block; }
.ans-label { font-weight: 900; color: var(--accent); font-size: 14px; margin-bottom: 6px; }
.placeholder-note {
  color: var(--muted);
  font-size: 14px;
  font-style: italic;
  padding: 40px 0;
  text-align: center;
}

footer {
  text-align: center;
  padding: 24px;
  color: var(--muted);
  font-size: 12px;
  border-top: 1px solid var(--line);
}

@media (max-width: 480px) {
  .toc-label { font-size: 14px; }
  .toc-item { padding: 13px 14px; gap: 10px; }
}
</style>
</head>
<body>

<header>
  <a class="header-back" href="index.html">← Study Hub</a>
  <h1>청소년상담</h1>
</header>

<div class="toc-wrap" id="tocWrap">
  <div class="toc-section-title">목차</div>
  <div class="toc-list" id="tocList"></div>
</div>

<div class="quiz-wrap" id="quizWrap">
  <div class="quiz-header">
    <button class="quiz-back" onclick="showToc()">← 목차로</button>
    <div class="quiz-ch-title" id="quizChTitle"></div>
  </div>
  <div id="quizContent"></div>
</div>

<footer>청소년교육복지상담학과</footer>

<script>
const chapters = [{"id": "ch1", "label": "상담에 대한 이해"}, {"id": "ch2", "label": "청소년에 대한 이해"}, {"id": "ch3", "label": "정신분석 상담"}, {"id": "ch4", "label": "분석적 심리치료"}, {"id": "ch5", "label": "아들러 심리치료"}, {"id": "ch6", "label": "인간중심상담"}, {"id": "ch7", "label": "게슈탈트상담"}, {"id": "ch8", "label": "행동주의상담"}, {"id": "ch9", "label": "합리정서행동치료"}, {"id": "ch10", "label": "인지치료"}, {"id": "ch11", "label": "교류분석"}, {"id": "ch12", "label": "현실치료"}, {"id": "ch13", "label": "해결중심상담"}];
const quizData = [];

const tocList = document.getElementById('tocList');
chapters.forEach((ch, i) => {
  const count = quizData.filter(q => q.ch === ch.id).length;
  const item = document.createElement('div');
  item.className = 'toc-item';

  const num = document.createElement('span');
  num.className = 'toc-num';
  num.textContent = String(i + 1).padStart(2, '0');

  const label = document.createElement('span');
  label.className = 'toc-label';
  label.textContent = ch.label;

  const btn = document.createElement('button');
  if (count > 0) {
    btn.className = 'toc-btn';
    btn.textContent = '문제풀기 →';
    btn.addEventListener('click', () => showQuiz(ch));
  } else {
    btn.className = 'toc-btn wip';
    btn.textContent = '준비중';
  }

  item.appendChild(num);
  item.appendChild(label);
  item.appendChild(btn);
  tocList.appendChild(item);
});

function showToc() {
  document.getElementById('tocWrap').style.display = 'block';
  document.getElementById('quizWrap').style.display = 'none';
  window.scrollTo(0, 0);
}

function showQuiz(ch) {
  document.getElementById('tocWrap').style.display = 'none';
  document.getElementById('quizWrap').style.display = 'block';
  document.getElementById('quizChTitle').textContent = ch.label;
  renderQuiz(ch.id);
  window.scrollTo(0, 0);
}

function renderQuiz(chId) {
  const wrap = document.getElementById('quizContent');
  wrap.innerHTML = '';
  const items = quizData.filter(q => q.ch === chId);

  if (items.length === 0) {
    wrap.innerHTML = '<p class="placeholder-note">기출문제를 추가해주세요.</p>';
    return;
  }

  items.forEach((q, i) => {
    const card = document.createElement('article');
    card.className = 'qcard';

    const num = document.createElement('div');
    num.className = 'q-num';
    num.textContent = `문제 ${i + 1}`;
    card.appendChild(num);

    const body = document.createElement('pre');
    body.className = 'q-body';
    body.textContent = q.text;
    card.appendChild(body);

    if (q.ans) {
      const btn = document.createElement('button');
      btn.className = 'answer-btn';
      btn.innerHTML = '▶ 정답 및 해설 보기';
      card.appendChild(btn);

      const box = document.createElement('div');
      box.className = 'answer-box';
      box.innerHTML = `<div class="ans-label">정답: ${q.ans}</div><div>${q.exp || ''}</div>`;
      card.appendChild(box);

      btn.addEventListener('click', () => {
        const open = box.classList.contains('visible');
        box.classList.toggle('visible', !open);
        btn.classList.toggle('open', !open);
        btn.innerHTML = open ? '▶ 정답 및 해설 보기' : '▼ 정답 및 해설 닫기';
      });
    }

    wrap.appendChild(card);
  });
}
</script>
</body>
</html>
