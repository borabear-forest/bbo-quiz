<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>이상심리학</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap');

:root {
  --bg: #f7f4ef;
  --paper: #fffefb;
  --ink: #1c1a17;
  --muted: #7a7268;
  --line: #e3ddd4;
  --accent: #2d5016;
  --accent2: #7c4d00;
  --soft: #eef3e8;
  --warm: #fdf6ec;
  --radius: 16px;
  --shadow: 0 4px 24px rgba(28,26,23,.08);
  /* 토론거리 컬러 */
  --disc: #3d2b6b;
  --disc-soft: #f8f7fa;
  --disc-line: #a898d4;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.65;
  min-height: 100vh;
}

header {
  background: var(--ink);
  color: #fff;
  padding: 32px 24px 28px;
  text-align: center;
}
header h1 {
  font-family: 'Noto Serif KR', serif;
  font-size: clamp(22px, 4vw, 38px);
  letter-spacing: -.03em;
}

/* ── Chapter Nav ── */
.chapter-nav {
  background: var(--paper);
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 30;
  padding: 10px 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}

.ch-btn {
  flex: 0 0 auto;
  border: 1.5px solid var(--line);
  background: var(--paper);
  color: var(--muted);
  border-radius: 999px;
  padding: 5px 11px;
  font-size: 11.5px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all .18s;
  white-space: nowrap;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.ch-btn:hover { border-color: var(--accent); color: var(--accent); }
.ch-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* 토론거리 버튼 */
.ch-btn.disc-btn { border-color: var(--disc-line); color: var(--muted); }
.ch-btn.disc-btn:hover { border-color: var(--disc); color: var(--muted); background: var(--disc-soft); }
.ch-btn.disc-btn.active { background: var(--disc); color: #fff; border-color: var(--disc); }

@media (max-width: 480px) {
  .ch-btn { padding: 4px 9px; font-size: 11px; }
  .chapter-nav { padding: 8px 10px; gap: 5px; }
}

/* ── Layout ── */
.wrap { max-width: 860px; margin: 0 auto; padding: 32px 16px 80px; }
.chapter-section { display: none; }
.chapter-section.visible { display: block; }

.chapter-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 24px;
  padding-bottom: 14px;
  border-bottom: 2px solid var(--ink);
}
.chapter-header h2 {
  font-family: 'Noto Serif KR', serif;
  font-size: 24px;
  letter-spacing: -.04em;
}
.ch-count {
  font-size: 13px;
  color: var(--muted);
  font-weight: 700;
  background: var(--soft);
  border-radius: 999px;
  padding: 3px 10px;
}
/* 토론거리 챕터 헤더 */
.chapter-header.disc-header { border-bottom-color: var(--disc); }
.chapter-header.disc-header h2 { color: var(--disc); }
.disc-ch-count { background: var(--disc-soft); color: var(--disc); }

/* ── Question Card ── */
.qcard {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 20px 22px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.qcard.case-card {
  border-left: 3px solid var(--accent2);
  background: var(--warm);
}

.q-num {
  font-size: 11px;
  font-weight: 900;
  color: var(--muted);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.case-card .q-num { color: var(--accent2); }

.q-body {
  font-size: 15px;
  line-height: 1.75;
  font-family: 'Noto Sans KR', sans-serif;
  white-space: pre-wrap;
  word-break: keep-all;
  overflow-wrap: break-word;
}

/* ── 제시문 박스 (ㄱㄴㄷ 보기) ── */
.premise-box {
  background: #f4f0e8;
  border: 1px solid #d6cebc;
  border-radius: 10px;
  padding: 12px 16px;
  margin: 10px 0;
  font-size: 14px;
  line-height: 1.8;
  white-space: pre-wrap;
  font-family: 'Noto Sans KR', sans-serif;
  word-break: keep-all;
  overflow-wrap: break-word;
}

/* 선택지 */
.choices {
  font-size: 15px;
  line-height: 1.85;
  white-space: pre-wrap;
  font-family: 'Noto Sans KR', sans-serif;
  margin-top: 6px;
}

/* ── Answer Toggle ── */
.answer-btn {
  margin-top: 14px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 999px;
  border: 1.5px solid var(--accent);
  background: transparent;
  color: var(--accent);
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all .15s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.answer-btn:hover { background: var(--soft); }
.answer-btn.open { background: var(--accent); color: #fff; }

.answer-box {
  display: none;
  margin-top: 12px;
  padding: 14px 16px;
  background: var(--soft);
  border-radius: 12px;
  border: 1px solid #c8dbb8;
  font-size: 14px;
  line-height: 1.7;
}
.answer-box.visible { display: block; }
.ans-label { font-weight: 900; color: var(--accent); font-size: 14px; margin-bottom: 6px; }
.ans-explain { color: var(--ink); }

/* ── 토론거리 카드 ── */
.disc-section .chapter-header { border-bottom-color: var(--disc); }
.disc-card {
  background: var(--disc-soft);
  border: 1px solid var(--disc-line);
  border-radius: var(--radius);
  padding: 20px 22px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
  overflow: hidden;
  min-width: 0;
}
.disc-ch-label {
  font-size: 11px;
  font-weight: 900;
  color: var(--disc);
  letter-spacing: .08em;
  margin-bottom: 10px;
  text-transform: uppercase;
}
.disc-topic {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.7;
  margin-bottom: 10px;
  word-break: keep-all;
  overflow-wrap: break-word;
}
.disc-answer-btn {
  margin-top: 10px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 15px;
  border-radius: 999px;
  border: 1.5px solid var(--disc);
  background: transparent;
  color: var(--disc);
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all .15s;
  touch-action: manipulation;
}
.disc-answer-btn:hover { background: var(--disc-soft); }
.disc-answer-btn.open { background: var(--disc); color: #fff; }
.disc-answer-box {
  display: none;
  margin-top: 10px;
  padding: 14px 16px;
  background: #fff;
  border-radius: 12px;
  border: 1px solid var(--disc-line);
  font-size: 14px;
  line-height: 1.75;
  color: var(--ink);
  white-space: pre-wrap;
  word-break: keep-all;
  overflow-wrap: break-word;
}
.disc-answer-box.visible { display: block; }
.placeholder-note {
  color: var(--muted);
  font-size: 14px;
  font-style: italic;
  padding: 40px 0;
  text-align: center;
}

footer {
  text-align: center;
  padding: 24px;
  color: var(--muted);
  font-size: 12px;
  border-top: 1px solid var(--line);
}
</style>
</head>
<body>

<header>
  <h1>이상심리학</h1>
</header>

<nav class="chapter-nav" id="chapterNav"></nav>
<main class="wrap" id="mainWrap"></main>
<footer>이상심리학 기출문제 학습 자료</footer>

<script>
// ─── 챕터 순서: 총론 맨 앞, 사례형 제거, 토론거리 추가 ───
const chapters = [
  { id: 'etc',  label: '0. 총론' },
  { id: 'ch1',  label: '1. 불안장애' },
  { id: 'ch2',  label: '2. 강박 및 관련 장애' },
  { id: 'ch3',  label: '3. 외상 및 스트레스 관련 장애' },
  { id: 'ch4',  label: '4. 우울장애 및 양극성장애' },
  { id: 'ch5',  label: '5. 위기개입·자살·자해 관련' },
  { id: 'ch6',  label: '6. 해리장애와 신체증상장애' },
  { id: 'ch7',  label: '7. 급식·섭식·수면장애' },
  { id: 'ch8',  label: '8. 물질·성기능장애' },
  { id: 'ch9',  label: '9. 조현병 스펙트럼' },
  { id: 'ch10', label: '10. 성격장애' },
  { id: 'ch11', label: '11. 아동·청소년 장애' },
  { id: 'ch12', label: '12. 노인·인지장애' },
  { id: 'disc', label: '★ 토론거리 ★', isDisc: true },
];

// ─── 문제 데이터 (사례형 포함, case 챕터 복제 없음) ───
// 제시문 파싱: ㄱ,ㄴ,ㄷ 포함 부분과 선택지 분리
// text 안에 [PREMISE]...[/PREMISE] 마커로 박스 처리할 구간 표시
// 없으면 전체 pre-wrap

const Q = (ch, isCase, text, ans, exp) => ({ch, isCase, text, ans, exp});

const rawQuestions = [
// ── etc: 총론·분류·평가 ──
Q('etc',false,
`이상행동에 관한 생물학적 이론의 설명으로 옳은 것은?
① 이상행동은 사고, 정서, 행동의 핵심인 인지과정에 의해 유발된다.
② 내담자가 자신의 무의식적 갈등을 통찰하고 통찰내용을 실천하게 하는 훈습의 과정으로 구성된다.
③ 정신장애를 유발하는 부적응적 인지도식에 초점을 맞추고 있다.
④ 이상행동을 제거시키는 방법으로 소거, 처벌, 체계적 둔감법이 있다.
⑤ 이상행동을 유전적 요인과 뇌의 구조적 결함 등으로 인한 질병으로 본다.`,
'⑤','생물학적 모델은 이상행동을 유전자·신경전달물질 이상·뇌 구조 결함 등으로 설명한다. ①③은 인지모델, ②는 정신역동(훈습), ④는 행동주의의 설명이다.'),

Q('etc',false,
`이상행동의 분류와 평가의 장점에 관한 설명으로 옳지 않은 것은?
① 예후와 치료의 효과성을 예측하는데 도움이 된다.
② 심리장애의 유사성과 차이점을 구별하는데 도움을 준다.
③ 치료자나 환자의 자기충족적 예언 결과가 발생할 수 있다.
④ 정신건강 전문가 사이에 효과적인 의사소통을 가능하게 한다.
⑤ 정신장애에 대한 과학적 연구와 이론개발을 위한 기초를 제공한다.`,
'③','자기충족적 예언(낙인 효과·기대 효과)은 분류·평가의 단점이다. 나머지 ①②④⑤는 모두 장점에 해당한다.'),

Q('etc',false,
`이상행동의 분류와 평가체계에 관한 설명으로 옳은 것은?
① DSM-5는 다축체계를 폐지하였다.
② 세계보건기구(WHO)가 DSM 체계를 개발하였다.
③ 미국 정신의학회(APA)가 ICD 체계를 개발하였다.
④ ICD 체계는 DSM 체계에 비해 정신장애를 더 상세하게 분류한다.
⑤ 범주적 분류와 차원적 분류를 상호 독립적으로 사용하여야 한다.`,
'①','DSM-5는 DSM-IV-TR의 다축체계(Axis I~V)를 폐지하고 단일 진단 체계로 통합하였다. ②DSM은 APA 개발, ③ICD는 WHO 개발(②③이 서로 뒤바뀐 오류). ④DSM이 ICD보다 더 상세하게 분류한다.'),

Q('etc',false,
`정신장애의 평가에 관한 설명으로 옳은 것을 모두 고른 것은?
[PREMISE]ㄱ. 비구조화된 면접은 훈련을 받지 않은 평정자가 실시해도 신뢰도가 높다.
ㄴ. 정신상태검사에는 외모와 행동은 포함되지 않는다.
ㄷ. 뇌 손상을 판단하기 위해 신경심리검사를 실시한다.
ㄹ. 자기 관찰도 평가 자료로 활용된다.
ㅁ. 평가를 위한 검사가 표준화 과정을 거쳤다면, 신뢰도와 타당도는 중요하지 않다.[/PREMISE]
① ㄱ, ㅁ ② ㄴ, ㄷ ③ ㄷ, ㄹ ④ ㄱ, ㄷ, ㄹ ⑤ ㄴ, ㄹ, ㅁ`,
'③','ㄷ(신경심리검사: 뇌 손상 평가), ㄹ(자기 관찰도 평가 자료)이 옳다. ㄱ은 틀림—비구조화 면접은 신뢰도 낮음. ㄴ은 틀림—정신상태검사(MSE)는 외모·행동 포함. ㅁ은 틀림—표준화 여부와 무관하게 신뢰도·타당도는 항상 중요하다.'),

Q('etc',false,
`정신장애의 진단에 관한 설명으로 옳지 않은 것은?
① 미국 정신의학회(APA)가 발간한 분류체계는 DSM이다.
② DSM-5는 장애의 증상보다 원인에 더 초점을 두었다.
③ 진단은 사회적이고 문화적인 부분을 고려해야 한다.
④ 세계보건기구(WHO)에서 개발한 분류체계는 ICD이다.
⑤ 진단은 개인에게 낙인을 찍을 수 있으므로 신중해야 한다.`,
'②','DSM-5는 원인보다 관찰 가능한 증상 중심의 기술적 진단 체계이다. 나머지 설명은 모두 옳다.'),

Q('etc',false,
`이상행동의 분류와 평가에 관한 설명으로 옳지 않은 것은?
① DSM-5에서 다축체계를 폐기하였다.
② 정신상태검사에서 환자의 외모와 외현적 행동도 평가한다.
③ 적절한 평가방법과 절차를 계획하기 전에 평가목적을 명료화한다.
④ 수업시간에 교사가 아동의 산만한 행동을 평가하는 것은 자연주의적 행동관찰법이다.
⑤ DSM-5에서는 아동·청소년기에 처음 진단되는 장애를 독립적으로 제시하였다.`,
'⑤','DSM-IV까지는 "아동·청소년기에 처음 진단되는 장애"라는 독립 범주가 있었으나, DSM-5에서는 이 범주를 폐지하고 신경발달장애 등 각 해당 범주 안에 통합하였다.'),

Q('etc',false,
`프로이드(S. Freud)의 정신분석이론에 관한 설명으로 옳은 것은?
① 발달단계는 대인관계 욕구에 따라 구분된다.
② 오이디푸스 갈등이 나타나는 발달단계는 남근기이다.
③ 인간의 행동은 우연히 일어난다.
④ 역전이분석은 내담자가 치료과정에서 상담자에게 나타내는 전이현상을 분석하는 것이다.
⑤ 이상행동은 초기 아동기의 의식적 갈등에 의한 것이다.`,
'②','남근기(3~6세)에 오이디푸스 갈등이 나타난다. ①대인관계 욕구 발달 구분은 설리반(Sullivan). ③프로이트는 행동이 무의식적 원인에 의해 결정된다고 봄. ④역전이는 치료자가 내담자에게 갖는 무의식적 반응이다.'),

Q('etc',false,
`DSM-5의 소아기호증(소아성애장애)에 관한 설명 및 진단기준으로 옳은 것을 모두 고른 것은?
[PREMISE]ㄱ. 성적 대상이 되는 아동보다 8세 이상이어야 한다.
ㄴ. 보통 13세 이하 아동에 대한 성적 공상이나 성행위를 6개월 이상 지속한다.
ㄷ. 12세 아동과 지속적인 성행위를 맺고 있는 청소년기 후기 개인은 포함하지 않는다.
ㄹ. 최소한 16세 이상이어야 한다.
ㅁ. 남성의 경우 여자 아이만 대상으로 한다.[/PREMISE]
① ㄱ, ㄴ ② ㄱ, ㄷ, ㅁ ③ ㄴ, ㄷ, ㄹ ④ ㄴ, ㄹ, ㅁ ⑤ ㄱ, ㄴ, ㄷ, ㄹ`,
'③','ㄴ(13세 이하 아동 대상 성적 공상·성행위 6개월 이상), ㄷ(청소년 후기와 12세 전후 아동 간 지속적 성행위는 제외), ㄹ(16세 이상)이 옳다. ㄱ은 틀림(연령 차이 기준은 5세 이상), ㅁ은 틀림(남녀 아이 모두 해당 가능).'),

Q('etc',false,
`DSM-5에서 임상적 주의가 필요한 가족양육 관련 문제에 해당하는 것을 모두 고른 것은?
[PREMISE]ㄱ. 부모-아동 관계문제 ㄴ. 형제자매 관계문제 ㄷ. 부모와 떨어진 양육
ㄹ. 별거나 이혼에 의한 가족 붕괴 ㅁ. 부모의 관계 불화에 영향 받는 아동[/PREMISE]
① ㄴ, ㄹ ② ㄱ, ㄴ, ㄷ ③ ㄱ, ㄴ, ㄷ, ㅁ ④ ㄱ, ㄷ, ㄹ, ㅁ ⑤ ㄱ, ㄴ, ㄷ, ㄹ, ㅁ`,
'⑤','DSM-5 임상적 주의가 필요한 가족양육 관련 문제로는 ㄱ~ㅁ 모두 해당한다.'),

// ── ch1: 불안장애 ──
Q('ch1',false,
`DSM-5의 불안장애에 관한 설명으로 옳은 것은?
① 불안장애의 하위유형은 10가지이다.
② 분리불안장애는 공황발작을 반복적으로 경험하는 경우를 말한다.
③ 공황장애의 주요 특징은 다양한 사건이나 활동에 대해서 과도하게 불안해하고 걱정하는 것이다.
④ 사회불안장애는 다른 사람들과 상호작용하는 사회적 상황을 두려워하여 회피하는 경우를 말한다.
⑤ 범불안장애의 임상적 특징은 공포와 불안이 특정 상황과 대상에만 국한된다는 것이다.`,
'④','사회불안장애는 타인으로부터 부정적 평가를 받을 수 있는 사회적 상황에서 과도한 공포·불안을 느끼고 이를 회피하는 장애이다. ①불안장애 하위유형은 8가지, ②공황발작 반복은 공황장애 특징, ③광범위한 걱정은 범불안장애 특징, ⑤범불안장애는 특정 대상에 국한되지 않는다.'),

Q('ch1',false,
`DSM-5의 강박 및 관련장애에 해당하지 않는 것은?
① 신체이형장애 ② 분리불안장애 ③ 저장장애 ④ 털뽑기장애 ⑤ 피부 뜯기장애`,
'②','분리불안장애는 불안장애의 하위유형이다. 강박 및 관련장애에는 강박장애, 신체이형장애, 저장장애, 발모광, 피부뜯기장애 등이 포함된다.'),

Q('ch1',false,
`DSM-5의 불안장애 하위유형에 해당하는 것을 모두 고른 것은?
[PREMISE]ㄱ. 선택적 함구증 ㄴ. 분리불안장애 ㄷ. 특정공포증
ㄹ. 범불안장애 ㅁ. 사회불안장애[/PREMISE]
① ㄱ, ㄴ, ㄷ ② ㄱ, ㄴ, ㄹ, ㅁ ③ ㄱ, ㄷ, ㄹ, ㅁ ④ ㄴ, ㄷ, ㄹ, ㅁ ⑤ ㄱ, ㄴ, ㄷ, ㄹ, ㅁ`,
'⑤','DSM-5 불안장애 하위유형에 선택적 함구증, 분리불안장애, 특정공포증, 사회불안장애, 공황장애, 광장공포증, 범불안장애가 모두 포함된다.'),

Q('ch1',false,
`DSM-5의 공황장애에 관한 설명으로 옳지 않은 것은?
① 반복적으로 예상하지 못한 공황발작이 일어난다.
② 발작 혹은 그로 인한 지속적인 염려와 걱정, 발작과 관련한 심각한 부적응적인 행동들이 3개월 이상 나타나야 한다.
③ 공황장애 3요인 인지이론은 공황장애가 불안 민감성, 파국적 오해석, 공황적 자기 효능감에 의해서 유발된다고 본다.
④ 신경생물학적 관점에서는 청반핵과 노르에피네프린이 공황장애와 관련되어 있다고 본다.
⑤ 대표적인 치료방법으로 공황통제치료(panic control treatment)가 있다.`,
'②','공황장애 진단을 위해서는 발작 이후 다음 발작에 대한 지속적 걱정이나 부적응적 행동 변화가 1개월 이상 지속되어야 한다(3개월이 아님).'),

Q('ch1',false,
`DSM-5의 불안장애 하위범주에 해당하지 않는 것은?
① 강박장애 ② 분리불안장애 ③ 선택적 함구증 ④ 공황장애 ⑤ 광장공포증`,
'①','강박장애는 DSM-5에서 "강박 및 관련 장애"라는 독립 범주로 분류된다. 나머지는 모두 불안장애 하위유형이다.'),

Q('ch1',false,
`DSM-5의 범불안장애에 관한 내용으로 옳지 않은 것은?
① 핵심적 특징은 수많은 사건이나 활동에 대한 과도한 불안과 걱정이다.
② 불안과 걱정의 정도, 기간, 빈도는 예상되는 사건이 미치는 실제 영향에 비해 과도하다.
③ 일상생활에 대해서 지나치게 불안해하거나 걱정하는 기간이 최소 6개월 이상이다.
④ 특정 대상이나 상황에 대하여 극심한 공포나 불안이 유발된다.
⑤ 직업이나 건강, 재정, 사소한 문제와 같은 일상생활 환경에 대해 걱정한다.`,
'④','특정 대상·상황에 대한 극심한 공포는 특정공포증의 특징이다. 범불안장애는 광범위한 일상 주제에 걸친 통제하기 어려운 과도한 걱정이 핵심이다.'),

Q('ch1',false,
`DSM-5의 불안장애에 속하는 하위진단 범주들을 전형적인 발병 연령 순서대로 옳게 나열한 것은?
[PREMISE]ㄱ. 공황장애 ㄴ. 광장공포증 ㄷ. 특정공포증 ㄹ. 선택적 함구증[/PREMISE]
① ㄱ-ㄷ-ㄴ-ㄹ ② ㄴ-ㄱ-ㄹ-ㄷ ③ ㄷ-ㄱ-ㄴ-ㄹ ④ ㄷ-ㄹ-ㄱ-ㄴ ⑤ ㄹ-ㄷ-ㄱ-ㄴ`,
'⑤','발병 연령 순서: 선택적 함구증(ㄹ, 학령전기) → 특정공포증(ㄷ, 아동기) → 공황장애(ㄱ, 청소년~성인기) → 광장공포증(ㄴ, 성인기).'),

Q('ch1',false,
`DSM-5의 사회불안장애에 관한 설명으로 옳지 않은 것은?
① 하나 이상의 사회적 상황에서 공포와 불안을 보인다.
② 아동의 경우 또래집단에서는 공포와 불안을 보이지 않는다.
③ 타인의 부정적 평가를 두려워한다.
④ 전형적으로 공포, 불안, 회피는 6개월 이상 지속되어야 한다.
⑤ 사회적 또는 직업적 수행영역에서 현저한 고통이나 손상을 초래한다.`,
'②','사회불안장애가 있는 아동은 성인뿐 아니라 또래집단 상황에서도 공포·불안이 나타나야 진단된다.'),

Q('ch1',false,
`행동주의적 접근에 관한 설명으로 옳은 것은?
① 고전적 조건형성을 주장한 학자는 반두라(A. Bandura)이다.
② 이상행동은 주로 고전적 조건형성, 조작적 조건형성, 사회적 모델링의 3가지 학습원리로 설명된다.
③ 체계적 감법 둔은 뱀공포증 환자의 경우 치료 시작부터 하루종일 뱀을 목에 감고 생활하도록 하는 기법이다.
④ 무의식적 욕구를 변화시키는 것이 치료의 주된 목표이다.
⑤ 아동이 엄마의 심부름을 한 뒤 칭찬을 받는 것은 부적 강화이다.`,
'②','행동주의는 이상행동을 고전적 조건형성(파블로프), 조작적 조건형성(스키너), 사회적 모델링(반두라)의 세 가지 학습원리로 설명한다. ①고전적 조건형성은 파블로프. ③체계적 둔감화는 점진적 노출. ④무의식은 정신분석. ⑤칭찬은 정적 강화.'),

Q('ch1',false,
`월경전불쾌감장애에 관한 설명으로 옳지 않은 것은?
① DSM-5에 새롭게 추가되었다.
② 진단을 위해서는 연속되는 2개월 이상의 일일 증상 기록이 필요하다.
③ 신체적 증상, 심각한 기분변화, 불안 등이 나타난다.
④ 증상이 월경 시작 1주 전에 나타나며, 월경이 끝난 후에는 최소화되거나 없어져야 진단된다.
⑤ 일반적으로 폐경에 가까워질수록 증상은 경감된다.`,
'⑤','월경전불쾌감장애는 폐경 전환기에 증상이 오히려 악화되는 경향이 있다. 폐경 이후 소실되는 패턴이다.'),

Q('ch1',false,
`불안장애에 관한 설명으로 옳은 것을 모두 고른 것은?
[PREMISE]ㄱ. 공황장애는 갑작스럽게 죽을 것 같은 강렬한 불안과 공포가 나타난다.
ㄴ. 광장공포증은 다른 사람으로부터 평가받는 사회적 상황에 대한 과도한 불안과 공포가 나타난다.
ㄷ. 분리불안장애는 아동이 말을 할 수 있음에도 불구하고 특수한 사회적 상황에서 지속적으로 말을 하지 않는 행동이 나타난다.
ㄹ. 특정공포증은 특정한 대상이나 상황에 대한 과도한 불안과 공포가 나타난다.[/PREMISE]
① ㄱ, ㄴ ② ㄱ, ㄷ ③ ㄴ, ㄷ ④ ㄱ, ㄹ ⑤ ㄴ, ㄹ`,
'④','ㄱ(공황장애: 갑작스러운 극심한 공포)과 ㄹ(특정공포증: 특정 대상·상황의 과도한 공포)이 옳다. ㄴ은 사회불안장애, ㄷ은 선택적 함구증의 설명이다.'),

Q('ch1',false,
`분리불안장애에 관한 설명으로 옳지 않은 것은?
① 학령기 아동에서는 학교에 가기 싫어하거나 등교 거부로 나타난다.
② 행동치료, 놀이치료, 가족치료 등을 통하여 호전될 수 있다.
③ 부모의 양육행동, 아동의 유전적 기질, 인지행동적 요인 등이 영향을 미친다.
④ 지나치게 밀착된 가정에서 자랐거나 의존적인 성향의 아이에게 나타날 수 있다.
⑤ 성인의 경우 증상이 1개월 이상 나타날 때 진단될 수 있다.`,
'⑤','성인의 분리불안장애는 6개월 이상 지속되어야 진단된다(아동·청소년은 4주 이상).'),

Q('ch1',false,
`DSM-5의 불안장애에 관한 설명으로 옳은 것을 모두 고른 것은?
[PREMISE]ㄱ. 불안장애의 하위유형은 8가지이다.
ㄴ. 분리불안장애는 성인에게 나타나지 않는다.
ㄷ. 공황장애는 공황발작을 반복적으로 경험하는 장애이다.
ㄹ. 특정공포증은 특정한 대상이나 상황에 대한 현저한 공포, 불안, 회피가 6개월 이상 지속된다.
ㅁ. 광장공포증 상황 중 한 가지 상황에서만 현저한 공포와 불안, 회피가 나타난다면 상황형 특정공포증의 진단요건이 된다.[/PREMISE]
① ㄱ, ㄴ ② ㄴ, ㅁ ③ ㄷ, ㄹ ④ ㄷ, ㄹ, ㅁ ⑤ ㄱ, ㄷ, ㄹ, ㅁ`,
'④','ㄷ(공황장애: 반복적 공황발작), ㄹ(특정공포증: 6개월 이상 지속), ㅁ(광장공포증은 5개 상황 중 2개 이상 해당해야 하므로 1개만 해당하면 상황형 특정공포증)이 옳다. ㄴ은 틀림—분리불안장애는 성인에서도 진단 가능하다.'),

// ── ch2: 강박 및 관련 장애 ──
Q('ch2',false,
`DSM-5의 강박장애에 관한 설명으로 옳지 않은 것은?
① 강박사고나 강박행동은 시간을 소모하게 만든다.
② 일반적으로 발병 연령은 남성이 여성보다 더 빠르다.
③ 원하지 않은 불쾌한 생각이 자꾸 떠올라 그것을 제거하기 위한 행동을 반복하게 되는 장애이다.
④ 심리적 치료방법으로 노출 및 반응방지법이 효과적이라고 알려져 있다.
⑤ 강박사고와 강박행동 둘 중 하나가 존재하지 않는 경우 강박장애 진단을 내릴 수 없다.`,
'⑤','DSM-5 강박장애는 강박사고나 강박행동 중 하나만 존재해도 진단이 가능하다. 나머지 설명은 모두 옳다.'),

Q('ch2',false,
`DSM-5의 강박 및 관련 장애에 해당하지 않는 것은?
① 신체이형(변형)장애 ② 수집광(저장장애) ③ 피부뜯기(벗기기)장애 ④ 반추장애 ⑤ 다른 의학적 상태로 인한 강박 및 관련 장애`,
'④','반추장애(되새김장애)는 급식 및 섭식장애의 하위유형이다. 강박 및 관련 장애에는 강박장애, 신체이형장애, 저장장애, 발모광, 피부뜯기장애 등이 포함된다.'),

Q('ch2',false,
`DSM-5의 신체변형(이형)장애에 관한 설명으로 옳지 않은 것은?
① 하나 이상의 신체 결함에 과도하게 집착한다.
② 자기 얼굴의 미묘한 비대칭성을 발견한다.
③ 외모에 대한 높은 미적 민감성을 가진다.
④ 타인의 정서적 학대 및 무시와는 무관하다.
⑤ 성형수술을 원하는 경향이 있다.`,
'④','신체이형장애는 아동기·청소년기의 정서적 학대, 무시, 놀림 등과 관련이 있다. "타인의 정서적 학대와 무관하다"는 설명은 틀렸다.'),

Q('ch2',false,
`강박장애에 관한 설명으로 옳지 않은 것은?
① 강박적 믿음이 진실이 아니라고 확신하는 경우는 병식이 양호한 편이다.
② 안와 전두피질이나 기저핵의 기능 이상이 관련될 수 있다.
③ 프로이트(S. Freud)는 항문기 단계에 그 기원이 있다고 주장한다.
④ 행동치료기법의 하나로 노출 및 반응 방지법이 있다.
⑤ 아동기에는 남아보다 여아의 유병율이 더 높다.`,
'⑤','강박장애는 아동기에 남아의 유병률이 더 높다. 성인기에는 남녀 유병률이 비슷해진다. 나머지 설명은 모두 옳다.'),

// ── ch3: 외상 및 스트레스 관련 장애 ──
Q('ch3',false,
`DSM-5의 외상 및 스트레스 관련장애의 하위유형에 관한 설명으로 옳지 않은 것은?
① 반응성 애착장애: 아동이 보호자로 추정되는 사람과 애착이 없거나 명백하게 미발달되어 있다.
② 탈억제성 사회적 유대감 장애: 양육자와의 애착 외상을 경험한 아동이 낯선 사람을 대상으로 문화적으로 부적절하고 과도하게 친숙한 행동을 보인다.
③ 적응장애: 인식 가능한 스트레스 요인에 대한 반응으로 감정 또는 행동증상이 스트레스 요인이 시작된 지 3개월 이내에 발달한다.
④ 외상후 스트레스장애: 충격적인 외상사건을 경험한 후 그 후유증으로 1개월 이상 반복적이고 불수의적이며 침습적으로 외상사건이 떠오르는 고통스러운 증상을 경험한다.
⑤ 급성스트레스장애: 사별을 겪은 후 지나치게 심각한 애도 반응과 개인의 부적응 상태가 12개월 이상 지속되어 나타난다.`,
'⑤','⑤는 장기 슬픔장애(지속성 복합 사별장애)의 설명이다. 급성스트레스장애는 외상 노출 후 3일~1개월 이내에 증상이 나타나는 것이 특징이다.'),

Q('ch3',true,
`다음 사례에 해당하는 DSM-5의 장애는?
C씨는 3주 전 심각한 부상을 입고, 동승자는 사망하는 등 심각한 자동차 사고를 경험하였다. 그 후로는 그 사건에 대한 플래시백을 경험하고, 잠을 잘 못 자고 차를 타는 것을 두려워한다.
① 적응장애 ② 공황장애 ③ 강박장애 ④ 급성스트레스장애 ⑤ 외상후 스트레스장애`,
'④','3주 전 외상 사건 이후 플래시백·수면문제·회피가 나타나고 있다. PTSD는 1개월 이상 지속되어야 하므로, 아직 1개월이 되지 않은 이 사례는 급성스트레스장애(3일~1개월)에 해당한다.'),

Q('ch3',true,
`다음 사례에 해당하는 DSM-5의 진단명은?
C는 몇 개월 전부터 가슴이 답답해지고 사고가 날 것 같은 불안한 기분이 들었다. 그러던 중, 시내버스를 타고 가다가 갑자기 가슴이 두근거리면서 심장박동이 증가하고 몸이 떨리고 후들거리며 질식 할 것 같고 죽을 것 같아서 급하게 버스에서 내렸다. 병원에서 신체적으로는 별다른 이상이 없다고 하지만 지난 2개월 이상 이런 증상이 반복되면서 죽을 것 같은 공포 때문에 불안해한다.
① 파괴적 기분조절부전장애 ② 외상후 스트레스장애 ③ 광장공포증 ④ 공황장애 ⑤ 강박장애`,
'④','반복적인 예상치 못한 공황발작이 2개월 이상 지속되고 신체적 원인이 없으며 추가 발작에 대한 지속적 걱정이 있으므로 공황장애이다.'),

Q('ch3',false,
`DSM-5의 급성 스트레스장애와 외상후 스트레스장애에서 공통적으로 나타나는 진단기준은?
① 과도한 놀람 반응이 나타난다.
② 무모하거나 자기파괴적 행동을 한다.
③ 다른 사람들에 대해서 거리감이나 소외감을 느낀다.
④ 중요한 활동에 대한 관심이나 참여가 현저하게 감소한다.
⑤ 외상 사건의 원인이나 결과에 대해 자신이나 타인을 책망한다.`,
'①','과도한 놀람 반응은 급성스트레스장애와 PTSD 모두의 공통 과각성 증상이다. ②③④⑤는 PTSD에만 해당하는 기준이다.'),

Q('ch3',false,
`이상심리 모델에서 주장하는 것으로 옳지 않은 것은?
① 병적 소인 스트레스: 유전적 성향과 특정 스트레스 상황이 정신장애를 유발
② 인지주의: 이상행동은 사고, 정서, 행동의 핵심인 인지과정에 의해 유발
③ 행동주의: 이상행동은 고전적 조건형성, 조작적 조건형성, 모델링 학습의 결과
④ 정신역동: 이상심리 기능과 정상심리 기능은 서로 다른 과정에 기반
⑤ 인본주의: 자기실현을 이루게 되면 이상심리의 발현을 낮춤`,
'④','정신역동 모델에서는 이상심리와 정상심리가 동일한 심리적 과정(무의식, 방어기제 등)에 기반한다고 본다. "서로 다른 과정"이라는 설명은 틀렸다.'),

Q('ch3',false,
`DSM-5의 외상 및 스트레스 관련 장애의 하위 유형과 특징에 관한 설명으로 옳지 않은 것은?
① 반응성 애착 장애: 아동이 보호자로 추정되는 사람과 애착이 없거나 명백하게 미발달되어 있음
② 급성 스트레스 장애: 외상성 사건에 노출된 뒤 3일 이상 1개월 이내로 증상이 지속됨
③ 적응 장애: 스트레스 사건 후 정서적·행동적 문제들이 3개월 이내에 발생하고, 그 스트레스 요인이 사라지면 6개월 이내로 회복함
④ 외상 후 스트레스 장애: 외상성 사건을 경험한 후, 그 후유증으로 1개월 이상 다양한 부적응적 증상들을 재경험함
⑤ 탈억제성 사회적 유대감 장애: 소극적이며, 주변 인물에 대해 접근 행동을 보이지 않음`,
'⑤','탈억제성 사회적 유대감 장애는 낯선 사람에게 과도하게 친숙하게 접근하는 것이 특징이다. "소극적이며 접근 행동을 보이지 않는" 것은 반응성 애착장애의 특징이다.'),

Q('ch3',true,
`다음 사례에 적절한 진단명은?
20대 중반의 A는 몇 년 전부터 자신의 눈이 너무 작고, 입술이 매우 두꺼우며, 얼굴형이 사각형이라는 생각에 사로잡혀 집 밖을 나서는 것이 두려웠다. 실제로 A는 전혀 그렇게 보이지 않지만, 사람들이 자신의 외모를 비웃을 것이라고 괴로워하였다.
① 외상후 스트레스장애 ② 적응장애 ③ 범불안장애 ④ 주요우울장애 ⑤ 신체변형(이형)장애`,
'⑤','실제로 결함이 없는 외모에 집착하고 타인이 비웃을 것이라는 지속적 걱정으로 외출을 기피하는 것은 신체이형장애의 전형적 양상이다.'),

// ── ch4: 우울장애 및 양극성장애 ──
Q('ch4',false,
`DSM-5의 우울장애에 관한 설명으로 옳은 것을 모두 고른 것은?
[PREMISE]ㄱ. 주요우울장애의 증상 가운데 적어도 하나는 우울한 기분이거나 흥미나 즐거움의 상실이어야 한다.
ㄴ. 파괴적 기분조절부전장애는 만성적이면서 지속적으로 과민한 특징을 보인다.
ㄷ. 월경전불쾌감장애의 필수 증상은 불안정한 기분, 과민함, 불쾌감, 불안이다.
ㄹ. 지속성 우울장애는 6개월 동안 우울한 기분이 없는 날보다 있는 날이 더 많으며 우울감이 지속되는 장애이다.[/PREMISE]
① ㄱ, ㄴ ② ㄱ, ㄴ, ㄷ ③ ㄱ, ㄷ, ㄹ ④ ㄴ, ㄷ, ㄹ ⑤ ㄱ, ㄴ, ㄷ, ㄹ`,
'②','ㄱ·ㄴ·ㄷ이 옳다. ㄹ은 틀림—지속성 우울장애는 2년 동안 지속되어야 한다(6개월이 아님).'),

Q('ch4',false,
`DSM-5의 양극성 관련 장애에 관한 설명으로 옳지 않은 것은?
① 제Ⅰ형 양극성장애로 진단하기 위해서는 조증 삽화 진단기준이 충족되어야 한다.
② 제Ⅱ형 양극성장애는 과거 또는 현재의 조증 삽화와 경조증 삽화의 진단기준을 동시에 만족해야 한다.
③ 순환성장애는 경미한 형태의 조증 증상과 우울 증상이 2년 이상 번갈아 나타나는 만성적인 기분장애이다.
④ 우울장애와 다른 범주로 분류되어 있다.
⑤ 하위 유형으로 제Ⅰ형 양극성 장애, 제Ⅱ형 양극성 장애, 순환성장애가 있다.`,
'②','제II형 양극성장애는 조증 삽화 없이 1회 이상의 주요우울 삽화와 경조증 삽화가 있어야 한다. 조증 삽화가 있으면 제I형으로 진단된다.'),

Q('ch4',false,
`DSM-5의 우울장애에 관한 내용으로 옳지 않은 것은?
① 월경전불쾌감장애는 월경이 시작되기 1주 전에 여러 가지 우울증상이 나타난다.
② 주요우울장애는 우울한 기분 또는 흥미나 즐거움의 상실 증상이 필수적이다.
③ 지속성 우울장애는 적어도 2년 동안 하루의 대부분 우울한 기분이 있으며, 증상 없는 기간이 2개월 이상 지속되지 않는다.
④ 우울장애는 양극성장애와 같은 범주로 묶인다.
⑤ 파괴적 기분조절부전장애의 주요 특징은 만성적인 고도의 지속적 과민성이다.`,
'④','DSM-5에서 우울장애와 양극성장애는 서로 독립적인 범주이다. DSM-5에서 분리 분류되었다.'),

Q('ch4',false,
`DSM-5의 주요 우울장애 진단 기준을 모두 고른 것은?
[PREMISE]ㄱ. 우울증상 9개 중 5개 이상 ㄴ. 필수 증상은 2주 이상 지속
ㄷ. 조증 삽화가 나타나지 않음 ㄹ. 중요한 상실에 대한 반응에서 문화 차이 고려[/PREMISE]
① ㄱ, ㄴ ② ㄷ, ㄹ ③ ㄱ, ㄴ, ㄷ ④ ㄴ, ㄷ, ㄹ ⑤ ㄱ, ㄴ, ㄷ, ㄹ`,
'⑤','ㄱ~ㄹ 모두 주요우울장애 진단기준에 포함된다.'),

Q('ch4',false,
`우울 및 양극성 장애에 관한 설명으로 옳지 않은 것은?
① 조증 삽화와 주요우울 삽화는 제1형 양극성 장애를 진단하는 필수 조건이다.
② 세로토닌의 수준이 낮으면 우울이 유발될 수 있다.
③ 벡(A. Beck)은 자기 자신, 주변 환경, 미래에 대한 부정적 관점이 우울을 유발한다고 하였다.
④ 리튬은 양극성 장애의 치료 약물로 알려져 있다.
⑤ 코르티솔(cortisol) 수준이 높아지면 우울이 유발될 수 있다.`,
'①','제I형 양극성장애 진단에는 조증 삽화가 1회 이상 있으면 충분하다. 주요우울 삽화는 필수 조건이 아니다.'),

Q('ch4',false,
`DSM-5의 주요우울장애에 관한 설명으로 옳은 것은?
① 주요우울장애 삽화는 1개월 이상 연속으로 지속되어야 한다.
② 한 번 치료되면 그 이후 재발되지 않는다.
③ 어떤 연령대에서도 발병할 수 있지만, 아동기에 비해 청소년기에 발병가능성이 높아진다.
④ 조증삽화 또는 경조증삽화가 존재한 적이 있다.
⑤ 청소년기와 성인기에 남성의 유병율이 여성보다 높다.`,
'③','어떤 연령에도 발병 가능하며 청소년기부터 가능성이 높아지는 것은 맞다. ①2주 이상, ②재발률 높음, ④조증·경조증 있으면 양극성장애, ⑤청소년기 이후 여성이 약 2배.'),

Q('ch4',false,
`DSM-5의 양극성장애에 관한 설명으로 옳지 않은 것은?
① 제I형 양극성 장애는 여성과 남성의 발병빈도가 비슷하다.
② 기면증은 순환성 장애 진단에 포함된다.
③ 제II형 양극성 장애는 완전한 조증 삽화 없이 나타난다.
④ 제I형 양극성 장애는 남성의 발병빈도가 높다.
⑤ 제II형 양극성 장애의 자살(자해)시도 빈도는 제I형보다 낮다.`,
'②','기면증은 수면-각성장애의 하위유형으로, 순환성장애와는 전혀 다른 범주이다.'),

// ── ch5: 위기개입·자살 관련 ──
Q('ch5',false,
`알코올 사용장애에 관한 설명으로 옳은 것은?
① 가족력이나 유전과는 관련성이 거의 없다.
② 재발이나 회복에 미치는 가족의 영향력은 미미하다.
③ 자살, 사고, 폭력과의 관련성이 거의 없다.
④ 금단 증상의 불쾌한 경험을 피하거나 경감시키기 위해 음주를 지속하게 된다.
⑤ 집단상담은 효과가 없어 실시하지 않는다.`,
'④','알코올 금단 증상(불안, 떨림 등)을 피하기 위해 음주를 지속하는 것은 알코올 사용장애의 주요 유지 기제이다. ①유전적 요인과 강한 관련, ②가족 지지가 회복에 중요, ③자살·사고·폭력과 밀접한 관련, ⑤AA 등 집단상담이 효과적이다.'),

// ── ch6: 해리장애와 신체증상장애 ──
Q('ch6',false,
`DSM-5의 해리성 정체감장애에 관한 설명으로 옳은 것은?
① 자신의 생각, 감정, 감각, 신체 또는 행동에 관하여 외부관찰자가 된 것 같은 경험을 한다.
② 일상적인 망각으로는 설명하기 어려운 외상성이거나 스트레스성인 자서전적 정보를 회상하는 능력을 상실한다.
③ 둘 이상 다른 성격 상태를 특징적으로 나타내는 정체감의 분열을 보인다.
④ 주변환경이 비현실적으로 느껴지거나 그것과 분리된 것 같은 느낌을 갖는다.
⑤ 거의 또는 아예 없는 자극에도 과민한 행동이나 분노를 보이며 사람이나 물건을 대할 때 언어적·신체적 공격성을 나타낸다.`,
'③','해리성 정체감장애(DID)의 핵심은 둘 이상의 뚜렷한 성격 상태가 교대로 나타나는 정체감의 분열이다. ①은 이인증, ④는 비현실감장애의 특징이다.'),

Q('ch6',false,
`신체증상 및 관련 장애에 관한 설명으로 옳은 것을 모두 고른 것은?
[PREMISE]ㄱ. 질병불안장애는 자신이 어떤 심각한 질병에 걸려있다고 생각하고 개인적 건강 상태에 대해 매우 예민한 증상을 보인다.
ㄴ. 신체증상장애는 6개월 이상 한 개 이상의 신체 증상에 대한 지나친 생각, 불안, 행동을 보이거나 과도한 건강염려를 보인다.
ㄷ. 전환장애는 남성보다 여성에게서 2~3배 더 흔하다.
ㄹ. 인위성장애는 명백한 외적 보상을 얻기 위해 기만적으로 병을 만든다.[/PREMISE]
① ㄱ, ㄴ ② ㄷ, ㄹ ③ ㄱ, ㄴ, ㄷ ④ ㄴ, ㄷ, ㄹ ⑤ ㄱ, ㄴ, ㄷ, ㄹ`,
'③','ㄱ·ㄴ·ㄷ이 옳다. ㄹ은 틀림—인위성장애는 외적 보상 없이 환자 역할을 위해 증상을 만드는 것이며, 외적 보상 목적은 꾀병(malingering)이다.'),

Q('ch6',false,
`다음에 해당하는 해리성 정체감 장애 관련 이론은?
해당 이론은 해리현상이 발생하는 심리적 구조를 설명하기 위해서 해리를 억압과 구별되는 다른 유형의 방어기제로 주장한다. 억압과 해리는 모두 불쾌한 경험을 의식에서 밀어내는 방어적 기능을 한다는 점에서 유사하지만 그 방식이 다르다. 억압의 경우 수평분할을 기반으로 사고의 내용이 무의식으로 내려가는 반면, 해리는 수직분할이 생기고 사고의 내용들은 수평적인 의식 속에 머물게 된다.
① 외상 이론 ② 4요인 이론 ③ 신해리 이론 ④ 학습이론: 사회적 강화의 산물 ⑤ 빙의 이론`,
'③','신해리 이론(Hilgard)은 해리를 억압과 구별되는 별개의 방어기제로 보며, 수직분할에 의해 의식 내에서 분리·격리된다고 설명한다.'),

Q('ch6',false,
`다음에 해당하는 DSM-5의 신체증상 및 관련 장애는?
○ 분명한 속임수와 관련되어 신체적이거나 심리적 징후나 증상을 허위로 조작하거나 상처나 질병을 유도한다.
○ 다른 사람에게 자기 자신이 아프고 장애가 있거나 부상당한 것처럼 표현한다.
○ 명백한 보상이 없는 상태에도 기만적 행위가 분명하다.
① 신체증상장애 ② 꾀병 ③ 전환장애 ④ 인위성장애 ⑤ 질병불안장애`,
'④','인위성장애(허위성장애)는 외적 보상 없이 환자 역할을 하기 위해 의도적으로 증상을 만들어낸다. 외적 보상을 목적으로 하는 것은 꾀병이다.'),

Q('ch6',true,
`다음 사례에서 보이는 행동을 설명하는 DSM-5의 진단으로 옳은 것은?
A씨는 남편과 심하게 싸운 후 다음날 일터로 나갔고 그날 집에 돌아오지 않았다. 3주 후 A씨는 집에서 멀리 떨어져 있는 지방의 한 여관에서 눈을 떴으며, 어떻게 이곳에 왔는지 집을 떠난 후 무슨 일이 있었는지를 기억하지 못했다.
① 해리성 정체감 장애 ② 해리성 황홀경 ③ 비현실감 장애 ④ 이인증 ⑤ 해리성 기억상실: 해리성 둔주 동반`,
'⑤','스트레스 사건 후 집을 떠나 3주간의 기억이 없고 멀리 이동한 것은 해리성 기억상실(해리성 둔주 동반)의 전형적 사례이다.'),

Q('ch6',false,
`다음 설명에 해당하는 DSM-5의 장애는?
○ 읽은 내용의 의미를 이해하기 어렵다.
○ 덧셈, 뺄셈 등 연산절차에 어려움을 보인다.
○ 철자법에 어려움을 보인다.
① 과잉행동장애 ② 특정학습장애 ③ 틱장애 ④ 해리성 기억상실 ⑤ 양극성장애`,
'②','읽기·수학·쓰기 등 특정 학습 영역의 어려움은 특정학습장애의 전형적 특징이다.'),

Q('ch6',false,
`DSM-5의 성도착장애(변태성욕장애)에 관한 내용으로 옳은 것을 모두 고른 것은?
[PREMISE]ㄱ. 복장도착장애(의상전환장애)와 물품음란증은 함께 나타날 수 없다.
ㄴ. 노출장애는 눈치 채지 못한 사람에게 자신의 성기를 노출시켜 성적 흥분이 고조된다.
ㄷ. 관음장애는 18세 이상부터 진단할 수 있다.
ㄹ. 마찰도착장애(접촉마찰장애)는 동의하지 않은 사람에 대한 접촉, 마찰 등을 통해 강한 성적 흥분을 일으키는 반복적 행동이 6개월 이상 지속된다.
ㅁ. 소아성애장애는 소아에 대한 성적 충동이나 공상이 자신에게 현저한 고통이나 대인관계의 어려움을 초래하지 않는다.[/PREMISE]
① ㄱ, ㄴ, ㄷ ② ㄱ, ㄷ, ㄹ ③ ㄴ, ㄷ, ㄹ ④ ㄴ, ㄹ, ㅁ ⑤ ㄱ, ㄷ, ㄹ, ㅁ`,
'③','ㄴ(노출장애), ㄷ(관음장애: 18세 이상 진단), ㄹ(마찰도착장애: 6개월 이상)이 옳다. ㄱ은 틀림(함께 나타날 수 있음).'),

Q('ch6',false,
`DSM-5의 전환장애에 관한 내용으로 옳은 것은?
① 급성 삽화와 순환성 삽화로 나뉜다.
② 음식을 삼키기 어려운 증상도 포함된다.
③ 스트레스 요인이 없는 경우 진단되지 않는다.
④ 진단 시 증상을 고의적으로 만들었다는 판단이 필요하다.
⑤ 증상이나 결함이 심각한 고통이나 기능적 손상을 초래하지 않는다.`,
'②','전환장애 증상에는 삼키기 어려움(연하곤란)도 포함된다. ①삽화 구분 없음, ③스트레스 요인은 선택적 명시자, ④고의성은 인위성장애의 특징, ⑤전환장애는 고통·기능 손상이 있어야 진단된다.'),

Q('ch6',false,
`DSM-5의 해리장애에 관한 설명으로 옳은 것은?
① 해리는 외상적 사건을 자신과 통합시켜 이해하려는 시도이다.
② 해리장애는 신체적 질병에 의해 초래되는 경향이 높다.
③ 개인들이 이인증이나 비현실감을 경험하는 동안 현실 검증력이 저하된다.
④ 해리성 기억상실증은 통상적인 망각과 유사하다.
⑤ 해리성 정체성장애는 다중성격장애로 지칭되기도 한다.`,
'⑤','해리성 정체감장애(DID)는 과거에 다중성격장애(다중인격장애)로 불렸다. ①해리는 분리·격리, ③이인증·비현실감 경험 중에도 현실 검증력은 유지됨, ④해리성 기억상실은 통상적 망각으로 설명되지 않는다.'),

Q('ch6',false,
`DSM-5의 신체증상 및 관련 장애에 관한 설명으로 옳은 것을 모두 고른 것은?
[PREMISE]ㄱ. 신체증상장애는 사회경제적 수준이 높은 계층에서 흔히 나타난다.
ㄴ. 전환장애는 의학적으로 설명되지 않지만, 운동 및 감각 기능에 영향을 미친다.
ㄷ. 질병불안장애 환자는 자신의 신체 증상에 대해 비현실적이며 부정확한 의학적 해석을 내린다.
ㄹ. 인위성장애 환자는 의도적으로 신체 증상을 만들어 내거나 위장한다.[/PREMISE]
① ㄱ, ㄴ ② ㄱ, ㄷ ③ ㄴ, ㄷ ④ ㄷ, ㄹ ⑤ ㄴ, ㄷ, ㄹ`,
'⑤','ㄴ·ㄷ·ㄹ이 옳다. ㄱ은 틀림—신체증상장애는 사회경제적 수준이 낮거나 교육 수준이 낮은 집단에서 더 흔하다.'),

Q('ch6',true,
`다음 사례에 적절한 DSM-5의 진단명은?
고등학생 A는 부모님에게 심한 꾸지람을 들은 후 가출했다. 가출한 이후 아무도 A를 본 사람이 없고, A는 집에서 멀리 떨어진 지역에서 방황하다 2주 후 정신을 차려보니 낯선 길에 서 있었다. A는 자신에게 무슨 일이 일어났는지를 전혀 기억하지 못했다.
① 전환장애 ② 공황장애 ③ 인위성장애 ④ 해리성 기억상실 ⑤ 해리성 정체감장애`,
'④','스트레스 사건(꾸지람) 이후 2주간의 기억이 전혀 없고 멀리 이동한 것은 해리성 기억상실(해리성 둔주 동반)의 전형적 사례이다.'),

Q('ch6',true,
`다음 사례에 적절한 진단명은?
대학생 B는 자신의 정신이 이상해진 것이 아닌가 하는 걱정으로 상담자를 만나러 왔다. B는 상담자에게 자신의 현실감에 의문을 품기 시작했고, 꿈속에서 사는 듯 느껴졌으며, 자기 신체와 생각이 자기 것이 아닌 것 같다고 말했다. 또한, 자신의 몸 일부가 왜곡되어 자신의 손과 발이 무척 커 보이고 교정을 걸어 다닐 때면 주변 사람들이 마치 로봇처럼 느껴진다고 하였다.
① 이인성장애 ② 신경인지장애 ③ 분열형 성격장애 ④ 해리성 기억상실 ⑤ 해리성 정체감장애`,
'①','자신의 신체·생각이 자기 것이 아닌 것 같은 이인증과 주변 환경이 비현실적으로 느껴지는 비현실감을 동시에 경험하는 것은 이인증/비현실감장애(이인성장애)의 전형적 증상이다.'),

Q('ch6',false,
`DSM-5의 질병불안장애에 관한 설명 및 진단기준으로 옳지 않은 것은?
① 건강(질병)에 대한 몰두가 3개월 이상 지속되어야 한다.
② 심각한 질병에 걸려 있거나 걸리는 것에 대해 몰두한다.
③ 유병률은 남성과 여성이 비슷하다.
④ 의학적 진료추구형과 진료회피형으로 세분된다.
⑤ 의학적 상태가 나타나도 질병에 대한 몰두가 과도하거나 부적절하다.`,
'①','질병불안장애는 건강에 대한 과도한 몰두가 6개월 이상 지속되어야 한다(3개월이 아님).'),

Q('ch6',false,
`다음 증상들이 나타날 때 적절한 진단명은?
○ 의학적 상태, 물질 중독이나 금단, 치료약물의 사용 등으로 일어난다는 증거가 있다.
○ 주의를 집중하는 것이 어렵고, 이해할 수 없는 말을 중얼거린다.
○ 방향 감각이 없고 자신의 이름을 말하지 못한다.
○ 위의 증상들이 갑자기 나타나고, 몇 시간이나 몇 일간 지속되다가 그 원인을 제거하면 회복되는 경우가 많다.
① 섬망 ② 경도신경인지장애 ③ 주요신경인지장애 ④ 이인증 ⑤ 해리성 정체감장애`,
'①','갑작스러운 주의·인식의 교란이 나타나고, 의학적 상태·물질·약물에 의해 유발되며, 원인 제거 시 회복되는 것은 섬망의 전형적 양상이다.'),

Q('ch6',false,
`신체증상 및 관련 장애에 관한 설명으로 옳은 것을 모두 고른 것은?
[PREMISE]ㄱ. 질병불안장애는 자신이 어떤 심각한 질병에 걸려 있다고 생각하는 등 현실에 맞지 않는 걱정과 두려움을 가지는 것이다.
ㄴ. 전환장애는 신경학적·의학적 소견 없이 운동 및 감각기능의 이상, 신체적 경련이나 발작 등이 나타난다.
ㄷ. 허위성장애는 어떤 현실적 이득이나 목적을 가지고 고의적으로 병을 만들어내는 것이다.
ㄹ. 신체증상장애는 한 개 이상의 신체적 증상에 대한 과도한 생각·불안·행동이 나타난다.[/PREMISE]
① ㄱ, ㄴ ② ㄴ, ㄷ ③ ㄱ, ㄴ, ㄹ ④ ㄱ, ㄷ, ㄹ ⑤ ㄴ, ㄷ, ㄹ`,
'③','ㄱ·ㄴ·ㄹ이 옳다. ㄷ은 틀림—허위성장애(인위성장애)는 외적 이득 없이 환자 역할을 위해 증상을 만드는 것이다. 외적 이득 목적은 꾀병(malingering)이다.'),

// ── ch7: 급식·섭식·수면장애 ──
Q('ch7',false,
`DSM-5에서 제시된 공황장애 증상으로 옳지 않은 것은?
① 발한 ② 심계 항진 ③ 불면증 ④ 감각이상 ⑤ 죽을 것 같은 공포`,
'③','불면증은 공황발작의 13개 진단기준 증상에 포함되지 않는다. 발한, 심계항진, 감각이상, 죽을 것 같은 두려움은 모두 공황발작 증상이다.'),

Q('ch7',false,
`DSM-5의 지속성 우울장애 진단기준에 관한 설명으로 옳은 것을 모두 고른 것은?
[PREMISE]ㄱ. 분노 발작이 보통 일주일에 3번 이상 발생한다.
ㄴ. 다른 사람들로부터 부정적인 평가를 받을 수 있는 방식으로 행동을 하거나 불안증상을 나타내게 될까봐 두려워한다.
ㄷ. 식욕부진이나 과식, 절망감, 불면증이나 과다수면 등의 증상이 나타난다.
ㄹ. 주요우울장애 진단기준을 충족하는 증상이 2년간 지속적으로 나타날 수 있다.[/PREMISE]
① ㄱ, ㄴ ② ㄷ, ㄹ ③ ㄱ, ㄷ, ㄹ ④ ㄴ, ㄷ, ㄹ ⑤ ㄱ, ㄴ, ㄷ, ㄹ`,
'②','ㄷ(식욕부진·과식·절망감·수면 이상)과 ㄹ(2년 이상 주요우울삽화 지속 가능)이 옳다. ㄱ은 파괴적 기분조절부전장애, ㄴ은 사회불안장애의 특징이다.'),

Q('ch7',false,
`불면장애의 치료를 위한 수면위생 교육에 포함되지 않는 것은?
① 규칙적인 취침시간을 정한다.
② 낮에 길게 낮잠을 자는 것을 피한다.
③ 취침 전에 알코올을 섭취하지 않는다.
④ 취침 1시간 전에 격렬한 운동을 한다.
⑤ 잠자리에 누워 있는 동안 잠을 방해하는 행동을 하지 않는다.`,
'④','취침 직전 격렬한 운동은 교감신경을 자극하여 수면을 방해한다. 운동은 취침 최소 3~4시간 전에 마쳐야 한다.'),

Q('ch7',false,
`DSM-5의 신경발달장애에 해당하지 않는 것은?
① 의사소통장애 ② 지적장애 ③ 이식증 ④ 주의력결핍 및 과잉행동장애 ⑤ 운동장애`,
'③','이식증(pica)은 급식 및 섭식장애의 하위유형이다. 신경발달장애에는 지적장애, 의사소통장애, 자폐스펙트럼장애, ADHD, 특정학습장애, 운동장애가 포함된다.'),

Q('ch7',false,
`DSM-5의 주요우울장애에 관한 내용으로 옳은 것을 모두 고른 것은?
[PREMISE]ㄱ. 증상이 물질이나 약물의 효과는 아니어야 한다.
ㄴ. 조증 삽화나 경조증 삽화가 동반된다.
ㄷ. 거의 매일 불면이나 과다수면이 나타난다.
ㄹ. 아동과 청소년의 경우는 과민한 기분으로 나타나기도 한다.[/PREMISE]
① ㄱ, ㄴ ② ㄴ, ㄷ ③ ㄱ, ㄷ, ㄹ ④ ㄴ, ㄷ, ㄹ ⑤ ㄱ, ㄴ, ㄷ, ㄹ`,
'③','ㄱ·ㄷ·ㄹ이 옳다. ㄴ은 틀림—조증·경조증 삽화가 있으면 양극성장애로 진단되므로 주요우울장애에서는 없어야 한다.'),

Q('ch7',false,
`DSM-5의 제II형 양극성장애에 관한 내용으로 옳지 않은 것은?
① 1회 이상의 주요우울 삽화와 경조증 삽화가 있어야 한다.
② 목표지향적 활동이 증가되면서 수면욕구가 늘어난다.
③ 고양되거나 과민한 기분이 최소 4일 이상 지속된다.
④ 평소보다 말이 많아진다.
⑤ 조증 삽화는 1회도 없어야 한다.`,
'②','경조증 삽화에서는 수면욕구가 감소한다(잠을 적게 자도 피곤하지 않음). "수면욕구가 늘어난다"는 설명은 틀렸다.'),

Q('ch7',false,
`DSM-5의 악몽장애에 관한 내용으로 옳지 않은 것은?
① 남성이 여성에 비해 더 많이 나타난다.
② 악몽이 발생한 빈도에 따라 심각도를 구분한다.
③ 불쾌한 꿈에서 깨면 빠르게 지남력을 회복한다.
④ 청소년기 후기나 성인기 초기에 유병률이 가장 높다.
⑤ 주로 생존이나 안전을 위협하는 내용과 관련된 악몽을 꾼다.`,
'①','악몽장애는 여성에서 남성보다 더 흔하다. 나머지 설명은 모두 옳다.'),

Q('ch7',false,
`DSM-5의 신경성 식욕부진증에 관한 내용으로 옳은 것을 모두 고른 것은?
[PREMISE]ㄱ. 진단기준에 따르면 음식 섭취 후 자신에 대한 혐오감을 느낀다.
ㄴ. 사춘기 이전에 비해 청소년기 혹은 성인기 초기에 주로 나타난다.
ㄷ. 하위유형 중 제한형은 금식, 과도한 운동 및 하제, 이뇨제, 관장제 등을 오용한다.
ㄹ. 음식 섭취 제한의 1주일 평균 횟수에 따라 심각도를 경도, 중등도, 고도, 극도로 구분한다.[/PREMISE]
① ㄱ ② ㄴ ③ ㄱ, ㄷ ④ ㄴ, ㄷ, ㄹ ⑤ ㄱ, ㄴ, ㄷ, ㄹ`,
'②','ㄴ(청소년기~성인기 초기에 주로 발병)이 옳다. ㄱ은 폭식장애 특징. ㄷ은 제한형이 아닌 폭식/제거형의 특징. ㄹ은 신경성 식욕부진증이 아닌 폭식장애의 심각도 기준이다.'),

Q('ch7',false,
`DSM-5의 범불안장애의 증상에 속하지 않는 것은?
① 과민성 ② 근육의 긴장 ③ 사고의 비약 ④ 쉽게 피로해짐 ⑤ 수면 교란`,
'③','사고의 비약(flight of ideas)은 조증 삽화의 특징적 증상이다. 범불안장애의 증상으로는 안절부절못함, 쉽게 피로해짐, 집중 어려움, 과민성, 근육 긴장, 수면 장애가 있다.'),

Q('ch7',false,
`DSM-5의 섬망에 관한 설명으로 옳은 것은?
① 수면-각성 장애가 나타난다.
② 중년층의 유병률이 가장 높다.
③ 정보처리능력의 결함이 나타나지 않는다.
④ 조기 발견과 개입은 섬망의 지속 기간과 관계가 없다.
⑤ 하루 경과 중 병의 심각도가 일정하다.`,
'①','섬망에서는 수면-각성 주기의 교란(낮 졸림, 야간 각성 등)이 흔하다. ②고령층에서 유병률이 가장 높음. ③정보처리 능력 결함이 핵심 증상. ④조기 개입은 지속 기간을 단축. ⑤증상은 하루 중 변동한다.'),

Q('ch7',false,
`DSM-5의 수면-각성장애의 하위 유형과 특징에 관한 설명으로 옳은 것은?
① 불면장애: 과도한 수면 시간에도 불구하고 각성의 질 저하와 수면 무력증과 같은 증상을 보임
② 기면증: 수면을 개시하는 과정에서 어려움을 보이며, 수면의 양과 질이 불만족스러운 상태
③ 과다수면장애: 주간에 깨어 있는 상태에서 갑자기 저항할 수 없는 졸음을 느끼며 수면에 빠짐
④ 중추성 수면무호흡증: 수면다원검사에서 수면 시간당 5회 이상의 중추성 무호흡이 나타남
⑤ 악몽장애: 수면 중 다리에 불쾌한 감각을 동반하며, 다리를 움직이고 싶은 충동과 관련 있음`,
'④','중추성 수면무호흡증은 수면다원검사에서 시간당 5회 이상의 중추성 무호흡이 진단기준이다. ①은 과다수면장애, ②는 불면장애, ③은 기면증, ⑤는 하지불안증후군의 특징이다.'),

Q('ch7',false,
`DSM-5의 신경성 폭식증 진단 기준에 해당하는 것을 모두 고른 것은?
[PREMISE]ㄱ. 체중 증가를 막기 위해 반복적이고 부적절한 보상행동(구토, 하제 등의 약물 남용)을 보인다.
ㄴ. 평균적으로 최소 1주일에 1회 이상 3개월 동안 폭식과 부적절한 보상 행동을 실행한다.
ㄷ. 체중과 체형이 자기 평가에 지나치게 큰 영향을 미친다.
ㄹ. 문화적으로 용인된 관습에 의해 더 잘 설명되지 않는다.[/PREMISE]
① ㄱ, ㄴ ② ㄱ, ㄹ ③ ㄴ, ㄷ ④ ㄱ, ㄴ, ㄷ ⑤ ㄴ, ㄷ, ㄹ`,
'④','ㄱ·ㄴ·ㄷ이 신경성 폭식증 진단기준에 포함된다. ㄹ은 이식증 진단기준의 문구로 폭식증 기준에는 없다.'),

Q('ch7',false,
`DSM-5의 급식 및 섭식장애에 관한 설명으로 옳은 것은?
① 신경성 폭식증은 여성보다 남성에서 더 흔하다.
② 이식증은 되새김장애의 진단이 있으면 추가 진단될 수 없다.
③ 12개월 된 영아가 종이, 천, 머리카락 등을 반복해서 먹을 경우 이식증으로 진단된다.
④ 되새김장애는 청소년기에도 발병할 수 있다.
⑤ 신경성 식욕부진증에서는 부적절한 보상행동이 나타나지 않는다.`,
'④','되새김장애(반추장애)는 영아 외에도 청소년과 성인에서 발병할 수 있다. ①폭식증은 여성이 훨씬 많음. ②이식증과 되새김장애는 공존 진단 가능. ③12개월 영아는 발달적 정상 범주일 수 있어 이식증으로 진단하지 않음. ⑤폭식/제거형에서는 보상행동이 나타난다.'),

Q('ch7',false,
`DSM-5의 불면장애에 관한 설명으로 옳은 것을 모두 고른 것은?
[PREMISE]ㄱ. 각성수준이 높은 사람은 불면증에 걸리기 쉽다.
ㄴ. 불면에 대한 걱정과 두려움이 불면증을 지속시킨다.
ㄷ. 클라인-레빈증후군(Kleine-Levin syndrome)은 매우 심각한 불면장애이다.
ㄹ. 개인적 상실경험과 같은 스트레스 사건이 불면증 유발에 영향을 미친다.
ㅁ. 수면유지불면증은 아침에 예상한 시간보다 일찍 잠에서 깨어 잠을 이루지 못하는 것이다.[/PREMISE]
① ㄱ, ㄴ ② ㄴ, ㄷ ③ ㄱ, ㄴ, ㄹ ④ ㄴ, ㄷ, ㄹ, ㅁ ⑤ ㄱ, ㄴ, ㄷ, ㄹ, ㅁ`,
'③','ㄱ(과각성은 불면증 취약 요인), ㄴ(수면 걱정이 불면 만성화), ㄹ(스트레스 사건은 급성 불면증 촉발 요인)이 옳다. ㄷ은 틀림—클라인-레빈증후군은 과다수면장애의 한 유형. ㅁ은 틀림—이른 기상은 조기 각성 불면증이다.'),

Q('ch7',false,
`신경성 폭식증에 관한 설명으로 옳지 않은 것은?
① 폭식을 하지만 부적절한 보상 행동을 반복적으로 하지 않는 사람의 경우도 해당된다.
② 삽화 기간 동안 먹는 것에 대한 조절 능력의 상실감을 느낀다.
③ 일반적으로 청소년기 혹은 성인기 초기에 시작된다.
④ 신경성 식욕부진증의 삽화 기간과 겹치면 진단되지 않는다.
⑤ 자기평가에서 체형과 체중을 지나치게 강조하며, 이러한 요인이 자존감을 결정하는 데 있어 가장 중요하다.`,
'①','폭식만 있고 보상행동이 없는 경우는 폭식장애(Binge Eating Disorder)로 진단된다. 신경성 폭식증은 반드시 반복적인 보상행동이 있어야 한다.'),

Q('ch7',false,
`사건수면(parasomnia)에 해당되는 것은?
① 불면장애 ② 악몽장애 ③ 기면증 ④ 호흡 관련 수면장애 ⑤ 일주기 리듬 수면-각성장애`,
'②','사건수면(parasomnia)에는 악몽장애, 수면 공포증, 수면보행증, REM 수면 행동장애 등이 포함된다. 나머지는 다른 수면-각성장애 하위범주이다.'),

// ── ch8: 물질·성기능장애 ──
Q('ch8',false,
`DSM-5의 망상장애에 관한 설명으로 옳지 않은 것은?
① 적어도 1개월 동안 비영양성·비음식 물질을 계속 먹는다.
② 망상장애 하위유형으로 과대형, 피해형, 질투형, 신체형 등이 있다.
③ 1개월 이상의 지속 기간을 가진 한 가지 혹은 그 이상의 망상이 존재한다.
④ 조증이나 주요우울 삽화가 일어난다면 망상 지속 기간에 비해 상대적으로 짧다.
⑤ 망상의 영향이나 파생 결과를 제외한다면 기능이 현저하게 손상되지 않고 행동이 뚜렷하게 이상하거나 괴이하지 않다.`,
'①','①은 망상장애가 아닌 이식증(pica)에 대한 설명이다. 비영양성·비음식 물질을 먹는 것은 이식증의 핵심 진단기준이다.'),

Q('ch8',false,
`DSM-5의 알코올 중독 진단 증상에 관한 내용으로 옳지 않은 것은?
① 운동조정장애 ② 안구진탕 ③ 불분명한 언어 ④ 빈맥 혹은 심부정맥 ⑤ 집중력 또는 기억력 상실`,
'④','빈맥·심부정맥은 알코올 중독이 아닌 알코올 금단의 증상이다. 알코올 중독 증상은 불분명한 언어, 운동조정 장애, 불안정한 보행, 안구진탕, 주의·기억력 손상 등이다.'),

Q('ch8',false,
`DSM-5의 성별 불쾌감 장애 진단기준으로 옳지 않은 것은?
① 이성(반대 성)이 되고 싶은 강한 갈망은 있으나 자신이 이성(반대 성)이라고 주장하지는 않는다.
② 최소 6개월 기간으로 진단기준의 증상들이 나타나야 한다.
③ 남자 아이 또는 여자 아이는 이성(반대 성)의 복장을 선호하고 착장하기를 선호한다.
④ 자신의 해부학적 성별에 대해서는 강한 혐오를 가진다.
⑤ 가상 놀이 또는 환상 놀이에서 이성(반대 성)의 역할을 선호한다.`,
'①','성별불쾌감 장애에서는 이성이 되고 싶은 갈망뿐 아니라 자신이 다른 성이라고 확신하는 강한 신념도 진단기준에 포함된다.'),

Q('ch8',false,
`DSM-5에서 물질중독을 일으키지 않지만 물질사용장애와 물질금단을 일으키는 것은?
① 카페인 ② 알코올 ③ 담배(tobacco) ④ 대마(cannabis) ⑤ 펜사이클리딘(phencyclidine)`,
'③','담배(니코틴)는 물질중독(intoxication) 진단이 없지만 니코틴 사용장애와 니코틴 금단은 진단된다. 이는 DSM-5에서 담배가 갖는 독특한 특성이다.'),

Q('ch8',false,
`아편유사제(Opioids)에 해당되는 물질은?
① 코카인(Cocaine) ② 헤로인(Heroin) ③ 엘에스디(LSD) ④ 암페타민(Amphetamine) ⑤ 마리화나(Marijuana)`,
'②','헤로인은 모르핀에서 합성된 강력한 아편유사제(opioid)이다. 코카인·암페타민은 자극제, LSD는 환각제, 마리화나는 대마 계열이다.'),

Q('ch8',false,
`성관련 장애에 관한 설명으로 옳은 것은?
① 성별불쾌감의 아형에는 평생형/후천형, 전반형/상황형이 있다.
② 성욕장애 또는 흥분장애로 진단되기 위해서는 최소 6개월의 지속 기간이 있어야 한다.
③ 동성애자는 성별불쾌감에 해당된다.
④ 한 개인이 두 가지 이상의 변태 성욕을 보이는 경우는 거의 없다.
⑤ 관음장애는 만 12세 이상일 때 진단된다.`,
'②','성기능장애는 최소 6개월 이상 지속되어야 진단된다. ①성별불쾌감에는 해당 아형 구분 없음. ③동성애는 정신장애가 아님. ④한 개인이 여러 성도착증을 함께 보이는 경우가 있음. ⑤관음장애는 18세 이상에서 진단된다.'),

Q('ch8',false,
`도박장애에 관한 설명으로 옳지 않은 것은?
① 도박을 줄이거나 멈추고자 할 때 불안감과 짜증을 경험한다.
② 흥분을 얻기 위해 점점 더 많은 금액의 도박을 해야 하는 필요성이 있다.
③ 도박 자금을 마련하기 위한 불법적인 행위를 하는 경우도 있다.
④ 도박 행동이 기분 삽화에 의해서만 나타나는 경우도 진단된다.
⑤ 도박으로 인한 재정 상태의 절망적인 부분을 감추기 위해 가족에게 거짓말을 한다.`,
'④','도박 행동이 조증 삽화에 의해 더 잘 설명되는 경우에는 도박장애로 진단하지 않는다. 기분 삽화만으로 설명되면 배제된다.'),

// ── ch9: 조현병 스펙트럼 ──
Q('ch9',false,
`DSM-5의 조현병에 관한 설명으로 옳지 않은 것은?
① 양성증상에는 환각, 망상, 와해된 언어가 포함된다.
② 음성증상에는 무논리증, 무의욕증, 무언어증 등이 있다.
③ 활성기 증상이 1개월 이상 지속되어야 한다.
④ 사회적, 직업적 기능 손상이 없어도 진단될 수 있다.
⑤ 조현병 진단을 위해서는 전체 장애 기간이 6개월 이상이어야 한다.`,
'④','조현병 진단기준에는 사회적·직업적·일상적 기능의 현저한 손상이 포함된다. 기능 손상이 없어도 진단 가능하다는 설명은 틀렸다.'),

Q('ch9',false,
`DSM-5의 조현병 스펙트럼 장애에 관한 설명으로 옳은 것은?
① 단기 정신병적 장애의 증상 지속 기간은 1일 이상 3개월 미만이다.
② 조현양상장애의 진단기준 기간은 6개월 이상이다.
③ 조현정동장애는 기분 삽화가 없는 시기에도 조현병 진단기준이 충족된다.
④ 망상장애의 진단기준 기간은 6개월 이상이다.
⑤ 분열형 성격장애는 조현병 스펙트럼 외 장애로 분류된다.`,
'③','조현정동장애는 기분 삽화 없는 기간에도 2주 이상 망상이나 환각이 지속되는 것이 특징이다. ①단기 정신병적 장애: 1일~1개월 미만. ②조현양상장애: 1~6개월 미만. ④망상장애: 1개월 이상. ⑤분열형 성격장애는 조현병 스펙트럼으로 분류된다.'),

Q('ch9',false,
`DSM-5의 공황발작의 진단기준 증상에 해당되지 않는 것은?
① 환각 ② 발한 ③ 감각이상 ④ 죽을 것 같은 두려움 ⑤ 한기나 열감을 느낌`,
'①','환각은 공황발작 증상에 포함되지 않는다. 환각은 조현병 스펙트럼 등의 정신병적 증상이다. 공황발작 13개 증상에는 심계항진, 발한, 떨림, 숨막힘, 질식감, 흉통, 오심, 어지럼증, 오한·열감, 감각이상, 이인증·비현실감, 통제력 상실 공포, 죽을 것 같은 두려움이 있다.'),

Q('ch9',false,
`DSM-5의 조현병 스펙트럼장애에 관한 설명으로 옳지 않은 것은?
① 와해된 언어는 양성증상이다.
② 조현형 성격장애는 조현병 스펙트럼장애로 분류된다.
③ 조현정동장애는 주요 기분(주요우울 또는 조증)삽화 없이 존재하는 2주 이상의 망상이나 환각이 있다.
④ 단기 정신병적 장애의 심각도는 지난 7일 중 정신병의 일차 증상 각각에 대하여 가장 심한 정도를 5점 척도로 평가한다.
⑤ 망상장애의 가장 흔한 아형은 질투형이다.`,
'⑤','망상장애의 가장 흔한 아형은 피해형(persecutory type)이다. 질투형은 상대적으로 드물다.'),

Q('ch9',true,
`다음 사례에 적절한 진단명은?
중학교 1학년 학생인 A는 3개월 전 반장 선거에서 떨어진 후 학교 가기를 싫어하고 친구와 대화하는 것을 기피하는 등 학교생활적응에 어려움을 보이고 있다. 2개월 전부터 외모에 전혀 신경을 쓰지 않고 "죽어라" 라는 환청과 친구들이 자신을 학교에 다니지 못하도록 음모를 꾸민다는 피해망상을 호소하고 있다.
① 적응장애 ② 단기 정신병적 장애 ③ 외상후 스트레스장애 ④ 조현양상장애 ⑤ 조현병`,
'④','환청과 피해망상이 2개월째 지속되고 있으며, 전체 기간이 6개월 미만이므로 조현병(6개월 이상)이 아닌 조현양상장애(1~6개월)로 진단하는 것이 적절하다.'),

Q('ch9',true,
`A가 겪고 있는 성격장애에 관한 설명으로 옳지 않은 것은?
A는 가족과 동료로부터 늘 부당한 대우를 받고 있다고 생각한다. 직장동료들이 은근히 따돌리고 속이는 행동을 하여 억울한 감정을 표현하면 자신보고 불신과 의심이 많다고 한다. 자신을 모함하는 증거를 찾으려고 신경을 쓰다 보니 지치고 피곤하며 모욕당하고 있다는 기분이 든다.
① 사람들이 악의적이고 기만적이라는 신념을 가진다.
② 충분한 근거 없이 타인이 자신을 착취하고 해를 끼친다고 의심한다.
③ 치료에서는 상담자가 방어적으로 반응하기보다 솔직하고 일관성 있는 태도로 신뢰감을 주는 것이 중요하다.
④ 강한 스트레스를 받으면 짧은 기간 정신병적 삽화를 경험하기도 한다.
⑤ 자신의 증상을 불편해하는 자아이질성을 주로 보인다.`,
'⑤','편집성 성격장애는 자아동질적(ego-syntonic) 특성이 있어, 자신의 의심과 불신을 정당한 것으로 받아들인다. 자아이질성은 강박장애 등에서 흔히 나타난다.'),

// ── ch10: 성격장애 ──
Q('ch10',false,
`다음에 해당하는 DSM-5의 진단명으로 옳은 것은?
○ 자신의 목적 달성을 위해 타인 이용
○ 자신의 중요성에 관한 과장된 지각
○ 거만하고 방자한 행동이나 태도를 보임
○ 특별대우를 받을만한 이유가 없는데도 특별대우나 타인의 복종을 바람
① 편집성 성격장애 ② 분열성 성격장애 ③ 자기애성 성격장애 ④ 반사회성 성격장애 ⑤ 의존성 성격장애`,
'③','과대감, 타인 착취, 특별 대우 기대, 거만한 태도는 자기애성 성격장애의 핵심 특징이다.'),

Q('ch10',false,
`DSM-5의 연극성 성격장애에 관한 설명으로 옳지 않은 것은?
① 사회적으로 고립되어 있으며 타인과 가까운 대인관계를 맺지 못하고 기이한 생각과 행동이 나타난다.
② 자신이 관심의 초점이 되지 못하는 상황에서 불편감을 느낀다.
③ 다른 사람과의 관계에서 흔히 상황에 어울리지 않게 성적으로 유혹적이거나 도발적이다.
④ 지나치게 인상적이고 세밀함이 결여된 형태의 언어를 사용한다.
⑤ 타인과의 관계를 실제보다 더 가깝다고 생각해 거의 모든 지인을 친한 친구라고 표현한다.`,
'①','①은 분열형 성격장애(조현형 성격장애)의 특징이다. 연극성 성격장애의 핵심은 과도한 감정 표현과 관심 추구이다.'),

Q('ch10',false,
`'성격장애에 대한 대안적 DSM-5 모델'에서 도출될 수 있는 성격장애를 모두 고른 것은?
[PREMISE]ㄱ. 경계성 성격장애 ㄴ. 강박성 성격장애 ㄷ. 의존성 성격장애 ㄹ. 자기애성 성격장애[/PREMISE]
① ㄱ, ㄴ, ㄷ ② ㄱ, ㄴ, ㄹ ③ ㄱ, ㄷ, ㄹ ④ ㄴ, ㄷ, ㄹ ⑤ ㄱ, ㄴ, ㄷ, ㄹ`,
'②','DSM-5 대안적 성격장애 모델(Section III)에는 반사회성, 회피성, 경계성(ㄱ), 자기애성(ㄹ), 강박성(ㄴ), 조현형 성격장애 6가지가 포함된다. 의존성 성격장애(ㄷ)는 포함되지 않는다.'),

Q('ch10',false,
`DSM-5의 의존성 성격장애에 관한 내용으로 옳은 것은?
① 피암시성이 높아서 환경에 의해 쉽게 영향을 받는다.
② 자신의 능력을 스스로 과소평가한다.
③ 낡고 가치 없는 물건을 버리지 못하고 계속 간직한다.
④ 동기나 활력이 부족해서 일을 혼자서 시작하거나 수행하기 어렵다.
⑤ 친밀한 관계가 끝났을 때 그 사람과 관계를 지속하기 위해 더 의존하게 된다.`,
'④','의존성 성격장애는 타인에게 지나치게 의존하며, 혼자서 일을 시작하거나 수행하기 어려운 것이 특징이다. ①피암시성은 연극성 성격장애. ③물건 버리지 못함은 강박성 성격장애. ⑤관계 종료 시 즉시 새로운 의존 관계를 찾는 것이 특징이다.'),

Q('ch10',false,
`DSM-5의 강박성 성격장애에 관한 설명으로 옳지 않은 것은?
① 일과 생산성에 집중한다. ② 도덕적 가치 문제에서 양심적이다.
③ 현재의 삶에 집중하며 소비한다. ④ 타인에게 일을 위임하지 않는다.
⑤ 세부사항에 집착한다.`,
'③','강박성 성격장애는 인색하고 미래를 위해 돈을 지나치게 아끼는 경향이 있다. "현재의 삶에 집중하며 소비한다"는 설명은 정반대이다.'),

Q('ch10',false,
`DSM-5의 편집성 성격장애에 관한 설명으로 옳지 않은 것은?
① 타인의 동기를 악의적으로 해석한다.
② 다른 사람에게 자신의 비밀을 털어놓지 않는다.
③ 절도 등의 불법적인 일을 지속적으로 실행한다.
④ 타인에게 모욕을 받았다고 느끼면 즉시 반격한다.
⑤ 지속적으로 원한을 품는다.`,
'③','절도 등 불법 행위를 지속하는 것은 반사회성 성격장애의 특징이다. 편집성 성격장애의 핵심은 타인에 대한 광범위한 불신과 의심이다.'),

Q('ch10',true,
`다음 사례에 적절한 진단명은?
15세인 C는 친구들과 편의점에서 물건들을 훔치다가 경찰에 붙잡혔다. C는 초등학교 고학년 때부터 여러 번 가출을 하고 학교에도 무단결석 하였다. 중학교 1학년 때에는 반 친구들을 폭행하고 돈을 갈취하는 등의 행동을 보여 학교를 중퇴하게 되었다.
① 적대적 반항장애 ② 상동증적 운동장애 ③ 자폐스펙트럼장애 ④ 품행장애 ⑤ 반사회성 성격장애`,
'④','15세 미만의 반복적인 규칙 위반 행동(절도, 가출, 무단결석, 폭행, 갈취)은 품행장애로 진단한다. 반사회성 성격장애는 18세 이상에서 진단된다.'),

Q('ch10',true,
`다음 사례에 해당하는 성격장애는?
D씨는 남들이 자신을 거부하고 비난하고 수치심을 줄까봐 걱정을 많이 하며 다른 사람을 멀리했다. 또한 낯선 사람들과 만나서 대화하는 것이 늘 불편했고 두려웠다.
① 경계성 성격장애 ② 분열형 성격장애 ③ 의존성 성격장애 ④ 강박성 성격장애 ⑤ 회피성 성격장애`,
'⑤','거절·비난·수치에 대한 두려움으로 대인관계를 회피하고 낯선 사람과의 만남을 두려워하는 것은 회피성 성격장애의 전형적 특징이다.'),

Q('ch10',false,
`성격장애의 분류가 올바르게 연결되어 있지 않은 것은?
① A군: 분열성 성격장애 ② B군: 연극성 성격장애 ③ C군: 편집성 성격장애 ④ A군: 분열형 성격장애 ⑤ B군: 반사회성 성격장애`,
'③','편집성 성격장애는 C군이 아닌 A군에 속한다. A군: 편집성·분열성·분열형, B군: 반사회성·경계성·연극성·자기애성, C군: 회피성·의존성·강박성.'),

// ── ch11: 아동·청소년 장애 ──
Q('ch11',false,
`DSM-5의 신경발달장애에 관한 설명으로 옳은 것을 모두 고른 것은?
[PREMISE]ㄱ. 특정학습장애와 선택적 함구증은 신경발달장애의 하위 유형이다.
ㄴ. 사회적 의사소통장애는 DSM-5에서 처음으로 추가되었다.
ㄷ. 주의력결핍 과잉행동장애는 사회적 상호작용 결함이 지속적으로 나타난다.
ㄹ. 틱장애는 갑작스럽게 나타나고 반복적이고 비율동적인 운동 또는 음성 형태로 나타난다.[/PREMISE]
① ㄱ, ㄴ ② ㄴ, ㄹ ③ ㄷ, ㄹ ④ ㄱ, ㄷ, ㄹ ⑤ ㄱ, ㄴ, ㄷ, ㄹ`,
'②','ㄴ(사회적 의사소통장애는 DSM-5 신규 추가), ㄹ(틱장애: 갑작스럽고 반복적이며 비율동적인 운동/음성)이 옳다. ㄱ은 틀림—선택적 함구증은 불안장애. ㄷ은 틀림—사회적 상호작용 결함은 자폐스펙트럼장애의 핵심이다.'),

Q('ch11',false,
`DSM-5의 뚜렛장애에 관한 설명으로 옳은 것은?
① 18세 이후에 발병한다.
② 운동성 틱 또는 음성 틱 중 한 가지의 틱이 1년 이상 지속적으로 나타난다.
③ 목적이 없어 보이는 운동행동을 의도적으로 반복하는 특징을 보인다.
④ 틱 증상은 빈도에 있어서 악화와 완화를 반복하지만 처음 틱이 나타난 시점으로부터 2년 이상 지속된다.
⑤ 여러 가지 운동성 틱과 한 가지 이상의 음성 틱이 질병 경과 중 일부 기간 나타나지만, 동시에 나타나는 것은 아니다.`,
'⑤','뚜렛장애는 다양한 운동성 틱과 1개 이상의 음성 틱이 경과 중 나타나며, 동시에 나타날 필요는 없다. ①18세 이전 발병, ②운동성+음성 틱 모두 있어야 함, ③의도적 반복 운동은 상동증, ④1년 이상이 기준이다.'),

Q('ch11',false,
`DSM-5의 적대적 반항장애에 관한 설명으로 옳지 않은 것은?
① 아동이나 청소년의 경우 성인과 잦은 논쟁을 한다.
② 권위자의 요구, 규칙을 무시하거나 거부하는 행동을 적극적으로 자주 한다.
③ 자신의 실수나 잘못된 행동을 자주 남의 탓으로 돌린다.
④ 자주 화를 내고 크게 분개한다.
⑤ 사람과 동물에 대한 공격성을 보인다.`,
'⑤','사람과 동물에 대한 신체적 공격성은 품행장애의 진단기준이다. 적대적 반항장애는 분노·짜증, 논쟁적·반항적 행동, 복수심이 핵심이다.'),

Q('ch11',false,
`DSM-5의 주의력결핍 과잉행동장애에 관한 설명으로 옳지 않은 것은?
① 몇 가지의 부주의 또는 과잉행동-충동성 증상이 두 가지 또는 그 이상의 환경에서 존재한다.
② 주의력결핍 과잉행동장애가 있는 아동은 품행장애 등 공존장애를 가지고 있는 경우가 있다.
③ 성인기까지 지속되어 사회적·학업적·직업적 손상을 야기할 수 있다.
④ 리탈린(Ritalin)과 같은 중추신경자극제가 치료약물로 사용된다.
⑤ 학습에 필요한 준비물을 챙기지 못하는 것은 충동성 증상이다.`,
'⑤','준비물을 챙기지 못하는 것은 부주의(inattention) 증상이다. 충동성 증상은 질문 끝나기 전 대답, 줄 서서 기다리지 못함 등이다.'),

Q('ch11',false,
`DSM-5의 지적장애 중등도 수준에 해당하는 것을 모두 고른 것은?
[PREMISE]ㄱ. 말 표현 시 어휘나 문법에 상당한 제한이 있다.
ㄴ. 학령 전기 아동에서는 언어와 학습 준비 기술이 느리게 발달한다.
ㄷ. 전 발달 영역에 걸쳐, 개념적 기술이 또래에 비해 현저히 뒤처진다.
ㄹ. 전 발달 과정에 걸쳐 사회적 행동과 의사소통 행동에서 또래들과 확연한 차이를 보인다.[/PREMISE]
① ㄱ, ㄴ, ㄷ ② ㄱ, ㄴ, ㄹ ③ ㄱ, ㄷ, ㄹ ④ ㄴ, ㄷ, ㄹ ⑤ ㄱ, ㄴ, ㄷ, ㄹ`,
'②','지적장애 중등도에는 ㄱ(언어 표현 제한)과 ㄴ(학령전기 언어·학습 기술 느린 발달)이 해당한다. ㄷ은 고도, ㄹ은 최고도 수준에 해당한다.'),

Q('ch11',true,
`다음 사례에 해당하는 DSM-5의 신경발달장애는?
D군은 초등학교 3학년 학생으로 초등학교 1학년 때부터 눈을 깜박이고, 머리와 목을 빠르게 움직이고, 어깨를 들썩거리기 시작했다. 이러한 동작은 시도 때도 없이 나타났다. 1년 전부터는 이런 동작뿐만 아니라 중얼거리는 소리를 내기 시작했고, 부모가 그만두라고 야단을 치면 잠시만 조용할 뿐 다시 시작되었다. 중얼거리는 소리는 점점 커졌고, 여러 가지 욕도 들어 있었다.
① 투렛장애 ② 잠정적 틱장애 ③ 발달성 협응장애 ④ 상동증적 운동장애 ⑤ 지속성 운동 또는 음성 틱장애`,
'①','다양한 운동성 틱(눈 깜박임, 머리·목·어깨 움직임)과 음성 틱(중얼거림, 욕설)이 18세 이전에 발병하여 1년 이상 지속되며, 외설증(coprolalia)도 나타나는 전형적 투렛장애 사례이다.'),

Q('ch11',false,
`DSM-5의 품행장애 진단기준으로 옳지 않은 것은?
① 동물에게 신체적으로 잔인하게 대한다.
② 다른 사람의 집, 건물 또는 자동차를 망가뜨린다.
③ 심각한 손상을 입히려는 의도로 고의적으로 불을 지른다.
④ 부모의 제지에도 불구하고 13세 이전부터 자주 밤늦게까지 집에 들어오지 않는다.
⑤ 자주 화를 내고 크게 분개한다.`,
'⑤','자주 화를 내고 크게 분개하는 것은 적대적 반항장애(ODD)의 분노/짜증 증상이다. 품행장애 진단기준은 공격성, 재산 파괴, 사기/절도, 심각한 규칙 위반의 네 범주로 구성된다.'),

Q('ch11',false,
`신경발달장애에 관한 설명으로 옳은 것을 모두 고른 것은?
[PREMISE]ㄱ. 주로 초기 발달 단계에 발현되어, 개인·사회·학업·직업 기능에 손상을 야기하는 발달 결함이 특징이다.
ㄴ. ADHD의 진단 기준은 6세 이전이다.
ㄷ. 탈억제성 사회적 유대감 장애는 신경발달장애의 하위 유형이다.
ㄹ. 투렛장애는 자폐스펙트럼장애의 하위 유형이다.
ㅁ. 의사소통장애에는 언어, 말하기, 의사소통의 결함이 포함된다.[/PREMISE]
① ㄱ, ㄹ ② ㄱ, ㅁ ③ ㄱ, ㄷ, ㅁ ④ ㄴ, ㄷ, ㄹ ⑤ ㄴ, ㄹ, ㅁ`,
'②','ㄱ(신경발달장애: 초기 발달 단계 발현, 다양한 기능 손상)과 ㅁ(의사소통장애: 언어·말하기·의사소통 결함 포함)이 옳다. ㄴ ADHD는 12세 이전 증상 발현. ㄷ 탈억제성 사회적 유대감 장애는 외상·스트레스 관련 장애. ㄹ 투렛장애는 운동장애 하위유형이다.'),

Q('ch11',false,
`DSM-5의 강박 및 관련장애에 해당되는 것은?
① 범불안장애 ② 노출장애 ③ 유뇨증 ④ 병적 방화(방화광) ⑤ 신체변형(이형)장애`,
'⑤','신체이형장애(신체변형장애)는 강박 및 관련 장애의 하위유형이다. ①범불안장애는 불안장애, ②노출장애는 성도착장애, ③유뇨증은 배설장애, ④병적 방화는 파괴적·충동조절·품행 장애이다.'),

Q('ch11',false,
`DSM-5의 신경발달장애에 해당하지 않은 것은?
① 틱장애 ② 지적장애 ③ 말소리장애 ④ 특정학습장애 ⑤ 선택적 함구증`,
'⑤','선택적 함구증은 불안장애의 하위유형이다. 신경발달장애에는 지적장애, 의사소통장애(말소리장애 포함), 자폐스펙트럼장애, ADHD, 특정학습장애, 운동장애(틱장애 포함)가 해당한다.'),

Q('ch11',false,
`DSM-5의 주의력결핍 과잉행동장애에 관한 설명으로 옳지 않은 것은?
① 여성은 남성에 비해 주로 부주의 증상을 보인다.
② 리탈린(Ritalin)과 같은 중추신경계자극제가 치료약물로 사용된다.
③ 몇가지 부주의 또는 과잉행동-충동성 증상은 12세 이전에 나타난다.
④ 교사의 질문이 끝나기 전에 성급하게 대답하는 것은 부주의 증상이다.
⑤ 부주의, 충동성, 계획성 부족은 성인기까지 지속되는 경향이 있다.`,
'④','질문이 끝나기 전에 성급하게 대답하는 것은 충동성 증상이다. 부주의 증상은 집중 유지 어려움, 준비물 분실, 지시 따르기 어려움 등이다.'),

Q('ch11',false,
`DSM-5의 반응성 애착장애에 관한 설명 및 진단기준으로 옳지 않은 것은?
① 불안장애의 하위유형이다.
② 아동의 발달 연령이 9개월 이상이어야 한다.
③ 진단기준이 자폐스펙트럼장애를 만족하지 않는다.
④ 진단되려면 장애가 5세 이전에 나타나야 한다.
⑤ 성인 양육자에 대해 정서적으로 억제되고 위축된 행동을 나타낸다.`,
'①','반응성 애착장애는 불안장애가 아닌 외상 및 스트레스 관련 장애의 하위유형이다.'),

Q('ch11',false,
`DSM-5의 자폐스펙트럼장애에 관한 설명으로 옳지 않은 것은?
① 사회적 의사소통과 상호작용의 지속적 결함이 나타난다.
② 증상은 초기 발달 시기에 반드시 완전히 나타나야 한다.
③ 개념, 사회, 실행 영역에 해당되는 기능이 현저히 떨어진다.
④ 심각도에 따라 5등급으로 분류된다.
⑤ 염색체의 이상에 의해 유발되는 지적장애의 하나로 다운증후군이 있다.`,
'④','자폐스펙트럼장애는 심각도에 따라 3단계(수준 1·2·3)로 구분된다(5등급이 아님). 또한 ②증상이 초기에 반드시 "완전히" 나타날 필요는 없다—사회적 요구가 능력을 초과할 때까지 명확하지 않을 수 있다.'),

// ── ch12: 노인·인지장애 ──
Q('ch12',false,
`DSM-5의 경도 신경인지장애에 관한 내용으로 옳지 않은 것은?
① 장애의 원인은 주요 신경인지장애와 동일하다.
② 경도의 인지 손상이 일상생활의 독립적 능력을 방해한다.
③ 표준화된 신경심리검사에 의해서 경도의 인지 손상이 입증될 수 있다.
④ 경도의 인지 저하는 자신 또는 잘 아는 지인에 의해 인식될 수 있다.
⑤ 하나 이상의 인지 영역에서 이전에 비해 경도의 저하가 나타난다.`,
'②','경도 신경인지장애에서는 인지 저하가 있으나 일상생활의 독립적 능력은 보존된다. 일상 기능이 현저히 방해받는 것은 주요 신경인지장애(치매)이다.'),

      a: '교수님 강조: 섭식장애는 먹는 양의 문제가 아니라 자아 개념의 문제이다.\n\n섭식장애의 발병 시기가 14세와 18세에 두 번의 정점을 이루는 것은 우연이 아니다. 이 시기는 청소년기 핵심 발달과업인 자아정체감 형성과 정확히 겹친다. 청소년은 "나는 누구인가"를 탐색하면서 가장 먼저 눈에 보이는 것, 즉 외모와 체형을 자신을 설명하는 주요 기준으로 삼기 쉽다.\n\n특히 신경성 식욕부진증은 자기통제와 완벽주의의 표현이다. "완벽하게 통제해야만 안전하다"는 인지도식 속에서 음식 섭취 제한은 자기 자신을 완벽하게 관리하고 있다는 증거가 된다. 이 때문에 거식증 환자에게 단순히 "먹어라"고 하는 접근은 통하지 않는다. 음식이 아니라 통제감과 자기가치감을 다루어야 한다.\n\n반면 폭식증은 엄격한 절식이 무너지는 통제 실패의 표현이다. 이 역시 자신의 가치를 체형으로 규정하는 왜곡된 자기상에서 비롯된다.\n\n따라서 섭식장애 청소년을 상담할 때는 섭식 행동 자체보다 그 이면에 있는 자아정체감 형성의 어려움, 자기가치감, 완벽주의적 인지도식을 함께 다루는 것이 핵심이다.',

    {

      a: '두 장애는 모두 체중과 체형에 대한 과도한 집착, 자기평가에서 체형이 지나치게 큰 비중을 차지한다는 공통점이 있다. 또한 주로 청소년기~성인기 초기 여성에게 높은 유병률을 보인다.\n\n가장 핵심적인 차이는 체중과 섭식 행동 양상이다. 신경성 식욕부진증은 체중이 최소 기준 이하로 현저히 낮으며, 음식 섭취를 극단적으로 제한한다. 반면 신경성 폭식증은 체중이 정상 범위에 있는 경우가 많으며, 폭식과 보상행동(구토, 하제 등)이 반복된다.\n\n둘째, 심각도 측면에서 신경성 식욕부진증은 정신장애 중 사망률이 가장 높은 장애 중 하나로, 신체적 합병증이 심각하다. 신경성 폭식증은 신체 건강 문제가 있으나 상대적으로 사망 위험은 낮다.\n\n치료적으로 신경성 식욕부진증은 체중 회복이 우선 과제가 되며, 신경성 폭식증에는 인지행동치료와 폭식-제거 주기 차단이 핵심이 된다.'

  disc_ch8: [
    {
      q: '중독과 강박의 차이를 설명하시오.',
      a: '중독과 강박은 반복적인 행동이라는 표면적 유사성에도 불구하고 핵심 동기와 심리적 구조에서 근본적으로 다르다.\n\n첫째, 행동의 동기가 다르다. 강박 행동은 불안을 감소시키기 위한 목적으로 수행되며, 행동 자체에서 쾌감을 얻지 않는다. 반면 중독 행동은 도파민 보상 체계를 활성화하는 쾌락 추구에서 시작된다. 중독은 "하고 싶어서", 강박은 "안 하면 불안해서" 한다는 차이이다.\n\n둘째, 금단 여부이다. 중독에는 신체적·심리적 금단 증상이 존재하지만, 강박장애에는 금단 개념이 적용되지 않는다.\n\n셋째, 자아와의 관계이다. 강박 행동은 자아이질적(ego-dystonic)으로, 본인도 그 행동이 불합리함을 알면서도 멈추지 못한다. 중독 행동은 초기에는 자아동질적(ego-syntonic)으로 경험된다.\n\n임상에서 이 차이를 정확히 이해하는 것은 치료 방향 설정에 결정적이다. 강박장애에는 ERP가, 중독에는 동기 강화 상담과 재발 방지 전략이 핵심이 된다.'

    {
      q: '중독 치료에서 자조모임(AA)의 치료적 의미를 설명하시오.',
      a: '익명의 알코올 중독자들 모임(AA)을 비롯한 자조모임은 전문적 치료와는 다른 고유한 치료적 기능을 수행한다.\n\n첫째, 공감과 동일시 경험이다. 같은 경험을 가진 동료들과의 만남은 "나만 이런 게 아니다"라는 안도감과 소속감을 제공한다. 이는 전문 치료자가 제공하기 어려운 수평적 공감이다.\n\n둘째, 병식 촉진이다. 자신보다 앞서 회복 과정을 걷는 사람들을 보며 자신의 상태를 객관화하고 변화 가능성을 경험적으로 확인할 수 있다.\n\n셋째, 사회적 지지망 형성이다. 중독 행동을 부추기는 기존 관계를 대체할 건강한 사회적 연결을 제공한다. 재발 위기 상황에서 연락할 수 있는 현실적 지지가 된다.\n\n넷째, 재발 예방이다. 정기적인 참여가 회복 동기를 유지시키고 책임감을 강화한다. 중독 치료에서 재발은 흔한 과정이며, 자조모임은 재발 후 다시 회복 궤도로 돌아오는 데 중요한 역할을 한다.'

    {
      q: 'DSM-5에서 물질관련장애가 어떻게 변화했는지 설명하시오.',
      a: 'DSM-5에서 물질관련장애의 핵심 변화는 기존의 물질남용과 물질의존 구분을 폐지하고, 이를 단일한 물질사용장애로 통합한 것이다. 이는 중독을 이분법적으로 나누기보다 연속선상에서 이해하려는 변화이다.\n\nDSM-IV에서는 물질 관련 문제를 남용과 의존으로 구분하였다. 그러나 실제 임상에서는 두 범주의 경계가 명확하지 않았고, 남용과 의존이 독립된 질적 차이라기보다 심각도의 차이에 가깝다는 문제가 있었다. DSM-5에서는 이를 하나의 물질사용장애로 통합하고 경도·중등도·중증으로 심각도를 평가하게 되었다.\n\n또한 갈망(craving)이 중요한 진단 요소로 새롭게 포함되었다. 더불어 도박장애가 중독 관련 장애 범주에 포함되면서, 중독을 물질에만 국한하지 않고 행동중독까지 확장해 이해하게 되었다.\n\n즉 DSM-5의 변화는 중독을 남용/의존으로 이분하던 방식에서 벗어나, 심각도와 연속성·갈망·행동중독을 포함하는 스펙트럼 관점으로 전환한 것이다.'

      a: '중독행동이 반복되는 핵심 이유는 보상체계의 활성화와 반복 강화 때문이다.\n\n처음 물질을 사용하면 도파민 보상체계가 활성화되어 즐거움이나 긴장 완화가 나타난다. 이 경험은 정적 강화로 작용하여 사용 행동을 반복하게 만든다. 동시에 불안·우울·스트레스가 줄어드는 경험은 부적 강화로 작용한다. 즉 물질은 즐거움을 주기도 하고 고통을 줄여주기도 하면서 반복 사용을 강화한다.\n\n사용이 반복되면 같은 효과를 얻기 위해 더 많은 양이 필요해지는 내성이 생기고, 사용 중단 시 금단 반응이 나타난다. 이때 사람은 쾌락을 얻기 위해서뿐 아니라 금단의 고통을 피하기 위해 다시 물질을 사용하게 된다.\n\n따라서 중독행동은 보상 추구와 고통 회피가 동시에 작동하는 반복 구조이다. 이 때문에 단순한 쾌락 추구가 아니라 보상체계와 정서조절, 금단 회피가 결합된 복합적 문제로 이해해야 한다.'

  disc_ch10: [
    {
      q: '성격장애 치료의 목표는 "변화"인가 "관리"인가?',
      a: '성격장애 치료 목표를 둘러싼 이 질문은 임상적으로 매우 중요한 함의를 갖는다.\n\n성격장애는 성인기 이전부터 형성된 고착된 인지·정서·행동 패턴이다. 이 패턴이 장기간 개인의 정체성과 통합되어 있기 때문에, 완전한 성격 변화 자체는 현실적으로 어렵다. 이런 의미에서 치료의 목표는 증상 완화, 대인관계 안정화, 충동 조절 능력 향상, 현실 기능 유지, 자기인식 증가를 중심으로 설정된다.\n\n그러나 "변화 불가능"하다는 관점은 지나치게 비관적이다. 특히 C군 성격장애(회피성·의존성·강박성)는 치료 동기가 상대적으로 높고 불안을 기반으로 하기 때문에 치료적 변화 가능성이 크다. 경계선 성격장애 역시 변증법적 행동치료(DBT)를 통해 의미 있는 기능 향상이 가능하다.\n\n따라서 성격장애 치료의 목표는 "성격 제거"가 아니라 "적응적 기능 향상"이다. 변화와 관리를 대립적으로 보기보다, 관리를 통해 안정을 확보하고 그 위에서 점진적 변화를 추구하는 통합적 관점이 필요하다.'

      q: '성격장애를 범주적으로 분류하는 방식의 한계는 무엇인가?',

    {

    // 제시문 박스
    const box = document.createElement('div');
    box.className = 'premise-box';
    box.textContent = match[1].trim();
    frag.appendChild(box);
    lastIndex = match.index + match[0].length;
  }
  // 나머지 텍스트 (선택지 포함)
  if (lastIndex < text.length) {
    const pre = document.createElement('pre');
    pre.className = 'q-body choices';
    pre.textContent = text.slice(lastIndex).trim();
    frag.appendChild(pre);
  }
  // 마커가 없는 경우
  if (!premiseRe.test(text) && frag.childNodes.length === 0) {
    const pre = document.createElement('pre');
    pre.className = 'q-body';
    pre.textContent = text;
    frag.appendChild(pre);
  }
  return frag;
}

// ─── DOM 생성 ───
const nav = document.getElementById('chapterNav');
const wrap = document.getElementById('mainWrap');

const chapterCounters = {};
const questions = rawQuestions.map(q => {
  chapterCounters[q.ch] = (chapterCounters[q.ch] || 0) + 1;
  return { ...q, seqNum: chapterCounters[q.ch] };
});

chapters.forEach(ch => {
  if (ch.isDisc) {
    // ★토론거리★ 버튼
    const btn = document.createElement('button');
    btn.className = 'ch-btn disc-btn';
    btn.dataset.ch = 'disc';
    btn.textContent = ch.label;
    btn.addEventListener('click', () => switchChapter('disc'));
    nav.appendChild(btn);

    // 토론거리 섹션
    const section = document.createElement('section');
    section.className = 'chapter-section disc-section';
    section.id = 'sec-disc';

    const header = document.createElement('div');
    header.className = 'chapter-header';
    header.innerHTML = '<h2 style="color:var(--disc)">★ 토론거리 ★</h2>';
    section.appendChild(header);

    // 챕터별 서브탭 네비
    const subNav = document.createElement('div');
    subNav.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;';
    discChapters.forEach((dc, idx) => {
      const sb = document.createElement('button');
      sb.className = 'ch-btn disc-btn' + (idx === 0 ? ' active' : '');
      sb.dataset.disc = dc.id;
      sb.textContent = dc.label;
      sb.addEventListener('click', () => {
        subNav.querySelectorAll('.ch-btn').forEach(b => b.classList.remove('active'));
        sb.classList.add('active');
        section.querySelectorAll('.disc-sub-section').forEach(s => s.style.display = 'none');
        const target = section.querySelector('#' + dc.id);
        if (target) target.style.display = 'block';
      });
      subNav.appendChild(sb);
    });
    section.appendChild(subNav);

    // 각 챕터별 토론 내용 영역
    discChapters.forEach((dc, idx) => {
      const subSec = document.createElement('div');
      subSec.className = 'disc-sub-section';
      subSec.id = dc.id;
      subSec.style.display = idx === 0 ? 'block' : 'none';

      const subHeader = document.createElement('div');
      subHeader.innerHTML = '<div style="font-family:Noto Serif KR,serif;font-size:18px;font-weight:700;color:var(--disc);margin-bottom:16px;padding-bottom:10px;border-bottom:1.5px solid var(--disc-line)">' + dc.label + '</div>';
      subSec.appendChild(subHeader);

      const topics = discTopics[dc.id] || [];
      if (topics.length === 0) {
        const note = document.createElement('p');
        note.className = 'placeholder-note';
        note.textContent = '이 챕터의 토론 주제를 추가해주세요.';
        subSec.appendChild(note);
      } else {
        topics.forEach((t, ti) => {
          const card = document.createElement('div');
          card.className = 'disc-card';
          const lbl = document.createElement('div');
          lbl.className = 'disc-ch-label';
          lbl.textContent = '토론 ' + (ti + 1);
          card.appendChild(lbl);
          const topic = document.createElement('div');
          topic.className = 'disc-topic';
          topic.textContent = t.q;
          card.appendChild(topic);

          const aBtn = document.createElement('button');
          aBtn.className = 'disc-answer-btn';
          aBtn.innerHTML = '▶ 논의 포인트 보기';
          card.appendChild(aBtn);
          const aBox = document.createElement('div');
          aBox.className = 'disc-answer-box';
          aBox.textContent = t.a;
          card.appendChild(aBox);
          aBtn.addEventListener('click', () => {
            const open = aBox.classList.contains('visible');
            aBox.classList.toggle('visible', !open);
            aBtn.classList.toggle('open', !open);
            aBtn.innerHTML = open ? '▶ 논의 포인트 보기' : '▼ 논의 포인트 닫기';
          });
          subSec.appendChild(card);
        });
      }
      section.appendChild(subSec);
    });

    wrap.appendChild(section);
    return;
  }

  const chQs = questions.filter(q => q.ch === ch.id);
  if (chQs.length === 0) return;

  const btn = document.createElement('button');
  btn.className = 'ch-btn';
  btn.dataset.ch = ch.id;
  btn.textContent = ch.label;
  btn.addEventListener('click', () => switchChapter(ch.id));
  nav.appendChild(btn);

  const section = document.createElement('section');
  section.className = 'chapter-section';
  section.id = 'sec-' + ch.id;

  const header = document.createElement('div');
  header.className = 'chapter-header';
  header.innerHTML = '<h2>' + ch.label + '</h2><span class="ch-count">' + chQs.length + '문항</span>';
  section.appendChild(header);

  chQs.forEach(q => {
    const card = document.createElement('article');
    card.className = 'qcard' + (q.isCase ? ' case-card' : '');

    const qnum = document.createElement('div');
    qnum.className = 'q-num';
    qnum.textContent = (q.isCase ? '📋 사례형 · ' : '') + '문제 ' + q.seqNum;
    card.appendChild(qnum);

    // 제시문 파싱 렌더링
    const bodyFrag = renderQuestionBody(q.text);
    card.appendChild(bodyFrag);

    const ansBtn = document.createElement('button');
    ansBtn.className = 'answer-btn';
    ansBtn.innerHTML = '▶ 정답 및 해설 보기';
    card.appendChild(ansBtn);

    const ansBox = document.createElement('div');
    ansBox.className = 'answer-box';
    ansBox.innerHTML = '<div class="ans-label">정답: ' + q.ans + '</div><div class="ans-explain">' + q.exp + '</div>';
    card.appendChild(ansBox);

    ansBtn.addEventListener('click', () => {
      const open = ansBox.classList.contains('visible');
      ansBox.classList.toggle('visible', !open);
      ansBtn.classList.toggle('open', !open);
      ansBtn.innerHTML = open ? '▶ 정답 및 해설 보기' : '▼ 정답 및 해설 닫기';
    });

    section.appendChild(card);
  });
  wrap.appendChild(section);
});

// ─── 챕터 전환 ───
function switchChapter(chId) {
  document.querySelectorAll('.chapter-section').forEach(s => s.classList.remove('visible'));
  document.querySelectorAll('.ch-btn[data-ch]').forEach(b => b.classList.remove('active'));
  const target = document.getElementById('sec-' + chId);
  if (target) { target.classList.add('visible'); target.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
  const btn = document.querySelector('.ch-btn[data-ch="' + chId + '"]');
  if (btn) { btn.classList.add('active'); btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' }); }
}

// 첫 챕터(총론) 기본 표시
switchChapter('etc');
</script>
